<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidates UI</title>
    <!-- Favicon / PWA Setup -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="logo-512.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="logo-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <!-- Toastify CSS for React-Hot-Toast style -->

    <!-- Cloudinary Upload Widget -->

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            bg: '#f8f9fc',
                            border: '#e5e7eb',
                            textMuted: '#6b7280',
                            textDark: '#111827',
                            blue: '#134E8E',
                            red: '#C00707',
                            orange: '#FF4400',
                            yellow: '#FFB33F'
                        }
                    }

    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        i[class^="fi-"] {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .font-mono-custom {
            font-family: 'JetBrains Mono', monospace;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Dropdown animation */
        .dropdown-enter {
            animation: drop-in 0.15s ease-out forwards;
            transform-origin: top right;
        }

        @keyframes drop-in {
            0% {

                transform: scale(0.95) translateY(-5px);
            }

                transform: scale(1) translateY(0);

</head>

<body class="bg-brand-bg font-sans min-h-screen p-4 sm:p-6 md:p-8">

                <button id="btn-reassign-chest" onclick="window.reassignChestNumbers()" class="hidden items-center justify-center gap-2 w-10 h-10 sm:w-auto sm:px-5 sm:py-2.5 bg-white border border-gray-300 rounded-full text-[13px] font-bold text-gray-700 hover:bg-gray-50 transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5 whitespace-nowrap p-0">
                    <i class="fi fi-rr-shuffle text-sm sm:text-[13px]"></i>

                    <i class="fi fi-rr-add text-sm sm:text-[13px]"></i>
                    <span class="hidden sm:block">Create Candidate</span>

        <!-- Main Card Area -->

    <script>
        var candidatesData = [];
        var userRole = localStorage.getItem('userRole');
        var isTeamManager = userRole === 'Team Manager';

        if (isTeamManager) {
            // Hide the Create Candidate button for Team Managers
            setTimeout(() => {
                const createBtns = document.querySelectorAll('button[onclick="window.openCandidateSidebar()"]');
                createBtns.forEach(btn => {
                    btn.style.display = 'none';
                    if (btn.parentElement && btn.parentElement.classList.contains('ml-4')) {
                        btn.parentElement.style.display = 'none';
                    }
                });
            }, 0);
        } else {
            // Show admin-only buttons
            setTimeout(() => {
                const reassignBtn = document.getElementById('btn-reassign-chest');
                const exportBtn   = document.getElementById('btn-export-csv');
                if (reassignBtn) reassignBtn.classList.replace('hidden', 'flex');
                if (exportBtn)   exportBtn.classList.replace('hidden', 'flex');
            }, 0);
        }

        // STATE MANAGERS
        var selectedIds = new Set();
        var editingCandidateId = null;
        var activeDropdownId = null;
        var activeTeamsData = [];
        var allTeamsColorMap = {};  // team name → color (all teams, for display)
        var activeSectionsData = [];
        var candCurrentPage = 1;
        var candItemsPerPage = 25;
        var selectedImageUrl = null;

        var CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/duexban9y/auto/upload";
        var CLOUDINARY_PRESET = "festiveDB";

        window.handleCandidateImageSelect = async function (event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 2 * 1024 * 1024) {
                return showToast("❌ File too large. Max 2MB allowed.");
            }

            const preview = document.getElementById('candImagePreview');
            const uploadingIndicator = document.getElementById('candImageUploading');

            // Show local preview immediately
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(file);

            // Start Upload to Cloudinary
            uploadingIndicator.classList.remove('hidden');
            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_PRESET);

                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await res.json();

                if (data.secure_url) {
                    selectedImageUrl = data.secure_url;
                    showToast("✅ Photo uploaded!");
                } else {
                    throw new Error("Upload failed");
                }
            } catch (err) {
                console.error(err);
                showToast("❌ Failed to upload photo.");
                preview.innerHTML = `<i class="fi fi-rr-user text-3xl text-gray-200"></i>`;
                selectedImageUrl = null;
            } finally {
                uploadingIndicator.classList.add('hidden');
            }
        };

        function getTeamColor(teamName) {
            // Use allTeamsColorMap first (covers all teams regardless of isActive)
            if (allTeamsColorMap[teamName]) return allTeamsColorMap[teamName];
            const team = activeTeamsData.find(t => t.name === teamName);
            return team && team.color ? team.color : '#9CA3AF';
        }

        // Checkbox Generators
        function getUncheckedIcon(id) {
            return `<div onclick="toggleSelection('${id}', event)" class="w-5 h-5 rounded-full border-2 border-gray-200 hover:border-[#FFC107] bg-white cursor-pointer transition-colors"></div>`;
        }
        function getCheckedIcon(id) {
            return `<div onclick="toggleSelection('${id}', event)" class="w-5 h-5 rounded-full flex items-center justify-center bg-[#FFC107] cursor-pointer hover:scale-105 transition-transform">
                        <i class="fi fi-rr-check text-[10px] text-white"></i>
                    </div>`;
        }

        // Clean 3-Dot Action Menu
        function getActionMenu(id) {
            return `
                <div class="relative inline-block text-left menu-container">
                    <button onclick="openActionMenu('${id}', event)" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-gray-400 hover:text-gray-800">
                        <i class="fi fi-rr-menu-dots-vertical text-xs"></i>
                    </button>
                </div>`;
        }

        // FILTERING & SEARCH LOGIC
        var candSearchQuery = '';

        function applyCandFilters() {
            candSearchQuery = document.getElementById('search-candidates').value.toLowerCase().trim();
            candCurrentPage = 1;
            renderUI();
        }

        function getFilteredCandidates() {
            if (!candSearchQuery) return candidatesData;
            return candidatesData.filter(c => {
                const nameMatch = c.name && c.name.toLowerCase().includes(candSearchQuery);
                if (isTeamManager) return nameMatch;

                return nameMatch ||
                    (c.chestNo && String(c.chestNo).toLowerCase().includes(candSearchQuery)) ||
                    (c.admissionNo && String(c.admissionNo).toLowerCase().includes(candSearchQuery)) ||
                    (c.team && c.team.toLowerCase().includes(candSearchQuery)) ||
                    (c.section && c.section.toLowerCase().includes(candSearchQuery));
            });
        }

        window.reassignChestNumbers = async function() {
            if (!confirm('\u26a0\ufe0f This will REASSIGN chest numbers for ALL candidates based on their team Series:\n\nSeries 100 \u2192 101, 102...\nSeries 200 \u2192 201, 202...\nSeries 300 \u2192 301, 302...\n\nThis action cannot be undone. Continue?')) return;

            const btn = document.getElementById('btn-reassign-chest');
            const origHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fi fi-rr-spinner animate-spin text-sm"></i><span class="hidden sm:block">Reassigning...</span>';

            try {
                // Sort teams by chestNoSeries number
                const sortedTeams = [...activeTeamsData]
                    .filter(t => t.chestNoSeries)
                    .sort((a, b) => parseInt(a.chestNoSeries) - parseInt(b.chestNoSeries));

                if (sortedTeams.length === 0) {
                    typeof showToast === 'function' && showToast('\u274c No teams with chest series found. Set "Chest No. Series Base" in Teams settings first.');
                    return;
                }

                // Group candidates by team
                const byTeam = {};
                sortedTeams.forEach(t => byTeam[t.name] = []);
                candidatesData.forEach(c => {
                    if (byTeam[c.team] !== undefined) byTeam[c.team].push(c);
                    else console.warn('Skipping (no team):', c.name, c.team);
                });

                // Within each team, sort by current chest number (preserves relative order)
                sortedTeams.forEach(t => {
                    byTeam[t.name].sort((a, b) => {
                        const nA = parseInt(String(a.chestNo).replace(/\D/g, ''), 10) || 0;
                        const nB = parseInt(String(b.chestNo).replace(/\D/g, ''), 10) || 0;
                        return nA - nB;
                    });
                });

                // Build Firestore batches (max 499 ops each)
                const BATCH_LIMIT = 499;
                let batches = [db.batch()];
                let opCount = 0;

                sortedTeams.forEach(team => {
                    const blockStart = parseInt(team.chestNoSeries); // e.g. 101, 201, 301
                    byTeam[team.name].forEach((cand, i) => {
                        if (opCount >= BATCH_LIMIT) { batches.push(db.batch()); opCount = 0; }
                        batches[batches.length - 1].update(
                            db.collection('candidates').doc(cand.id),
                            { chestNo: String(blockStart + i) }
                        );
                        opCount++;
                    });
                });

                for (const batch of batches) await batch.commit();
                typeof showToast === 'function' && showToast(`\u2705 Reassigned chest numbers for ${opCount} candidates!`);
            } catch(err) {
                console.error('Reassign error:', err);
                typeof showToast === 'function' && showToast('\u274c Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = origHtml;
            }
        };

        window.exportToCSV = function() {
            if (candidatesData.length === 0) {
                typeof showToast === 'function' && showToast("❌ No data to export");
                return;
            }

            const headers = ["Chest No", "Name", "Admission No", "Class", "Section", "Team", "Status"];
            const rows = candidatesData.map(c => [
                c.chestNo || '',
                c.name || '',
                c.admissionNo || '',
                c.class || '',
                c.section || '',
                c.team || '',
                c.active ? 'Active' : 'Inactive'
            ]);

            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.map(val => `"${String(val).replace(/"/g, '""')}"`).join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "candidates_data.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            typeof showToast === 'function' && showToast("✅ CSV Exported!");
        };

        window.autoGenerateChestNo = function () {
            const chestInput = document.getElementById('candChest');
            if (editingCandidateId !== null) return; // Don't override when editing

            const teamSelect = document.getElementById('candTeam');
            const selectedTeam = teamSelect ? teamSelect.value : '';

            // Use the team's chestNoSeries field (e.g. 101, 201, 301)
            const teamObj = activeTeamsData.find(t => t.name === selectedTeam);
            const seriesBase = teamObj && teamObj.chestNoSeries ? parseInt(teamObj.chestNoSeries) : null;

            if (!seriesBase || !selectedTeam) {
                // No team/series — fallback to global max + 1
                let maxChest = 0;
                candidatesData.forEach(c => {
                    let num = parseInt(String(c.chestNo).replace(/\D/g, ''), 10) || 0;
                    if (num > maxChest) maxChest = num;
                });
                chestInput.value = maxChest + 1;
            } else {
                // Block: chestNoSeries=101 → 101-199, chestNoSeries=201 → 201-299
                const blockStart = seriesBase;       // Start exactly at series base
                const blockEnd   = seriesBase + 98;  // 101+98=199, 201+98=299

                // Find max chest already used by THIS team within its block
                let maxInBlock = blockStart - 1;
                candidatesData.forEach(c => {
                    if (c.team === selectedTeam) {
                        const num = parseInt(String(c.chestNo).replace(/\D/g, ''), 10) || 0;
                        if (num >= blockStart && num <= blockEnd && num > maxInBlock) {
                            maxInBlock = num;
                        }
                    }
                });

                const next = maxInBlock + 1;
                if (next > blockEnd) {
                    chestInput.value = next;
                    chestInput.classList.add('bg-red-50', 'border-red-400');
                    setTimeout(() => chestInput.classList.remove('bg-red-50', 'border-red-400'), 1500);
                } else {
                    chestInput.value = next;
                }
            }

            chestInput.classList.add('bg-[#FFB33F]/10', 'border-[#FFB33F]');
            setTimeout(() => chestInput.classList.remove('bg-[#FFB33F]/10', 'border-[#FFB33F]'), 600);
        };

        window.saveCandidate = function () {
            const chestNo = document.getElementById('candChest').value.trim();
            const name = document.getElementById('candName').value.trim();
            const admissionNo = document.getElementById('candAdmn').value.trim();
            const className = document.getElementById('candClass').value.trim();
            const section = document.getElementById('candSection').value;
            const active = document.getElementById('candActive').checked;

            if (!chestNo || !name || !section) {
                return typeof showToast === 'function' ? showToast("❌ Please fill out all required fields (*)") : alert("❌ Please fill out all required fields (*)");
            }

            // Preserve existing team and auction fields if editing to prevent resetting bid details
            let team = '';
            let inAuction = true;
            let status = 'available';
            let bidPrice = 0;
            if (editingCandidateId !== null) {
                const existing = candidatesData.find(c => c.id === editingCandidateId);
                if (existing) {
                    team = existing.team || '';
                    inAuction = existing.inAuction !== undefined ? existing.inAuction : true;
                    if (existing.status) status = existing.status;
                    if (existing.bidPrice) bidPrice = existing.bidPrice;
                }
            }

            const payload = { 
                chestNo, 
                name, 
                admissionNo: admissionNo || 'N/A', 
                class: className, 
                team: team, 
                section, 
                active, 
                imageUrl: selectedImageUrl || '', 
                inAuction: inAuction
            };
            if (status !== 'available') payload.status = status;
            if (bidPrice !== 0) payload.bidPrice = bidPrice;
            if (typeof firebase !== 'undefined' && firebase.firestore) {
                payload.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
            }

            if (editingCandidateId !== null) {
                db.collection('candidates').doc(editingCandidateId).update(payload).then(() => {
                    typeof showToast === 'function' && showToast("✅ Candidate updated!");
                    window.closeCandidateSidebar();
                });
            } else {
                if (typeof firebase !== 'undefined' && firebase.firestore) {
                    payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                }
                db.collection('candidates').add(payload).then(() => {
                    typeof showToast === 'function' && showToast("✅ Candidate added!");
                    window.closeCandidateSidebar();
                });
            }
        }

        // REAL-TIME LISTENERS (Candidates, Teams, Sections)
        if (window.candUnsub) window.candUnsub();
        if (window.candTeamsUnsub) window.candTeamsUnsub();
        if (window.candSectionsUnsub) window.candSectionsUnsub();

        if (typeof db !== 'undefined') {
            // 0. All-teams color listener (no isActive filter — ensures colors always show)
            db.collection('teams').onSnapshot(snap => {
                allTeamsColorMap = {};
                snap.forEach(doc => {
                    const t = doc.data();
                    if (t.name && t.color) allTeamsColorMap[t.name] = t.color;
                });
                renderUI();
            });

            // 1. Teams Listener (Only active) — for sidebar dropdown & series data
            window.candTeamsUnsub = db.collection('teams').where('isActive', '==', true).onSnapshot(snap => {
                activeTeamsData = [];
                const tmTeam = isTeamManager ? localStorage.getItem('managerTeam') : null;

                snap.forEach(doc => {
                    const team = doc.data();
                    if (isTeamManager && team.name !== tmTeam) return;
                    activeTeamsData.push(team);
                });

                // Populate sidebar team dropdown only if element exists
                const teamSelect = document.getElementById('candTeam');
                if (teamSelect) {
                    let optionsHTML = '<option value="">Waiting for Auction...</option>';
                    activeTeamsData.forEach(team => {
                        optionsHTML += `<option value="${team.name}">${team.name}</option>`;
                    });
                    teamSelect.innerHTML = optionsHTML;

                    if (isTeamManager && tmTeam) {
                        teamSelect.value = tmTeam;
                    }

                    teamSelect.onchange = function () {
                        window.autoGenerateChestNo();
                    };
                    teamSelect.disabled = true;
                }

                renderUI();
            });

            // 2. Sections Listener (Only active)
            window.candSectionsUnsub = db.collection('sections').where('isActive', '==', true).onSnapshot(snap => {
                activeSectionsData = snap.docs.map(doc => doc.data());
                const sectionSelect = document.getElementById('candSection');
                const currentVal = sectionSelect.value;
                let optionsHTML = '<option value="" disabled selected>Select Section</option>';
                activeSectionsData.forEach(section => {
                    optionsHTML += `<option value="${section.name}">${section.name}</option>`;
                });
                sectionSelect.innerHTML = optionsHTML;
                if (currentVal) {
                    sectionSelect.value = currentVal;
                    window.updateClassDropdown();
                }
            });

            // 3. Candidates Listener
            let query = db.collection('candidates');
            if (isTeamManager) {
                const tmTeam = localStorage.getItem('managerTeam');
                if (tmTeam) {
                    query = query.where('team', '==', tmTeam);
                }
                if (window.currentTMSection) {
                    query = query.where('section', '==', window.currentTMSection);
                }
            } else {
                query = query.orderBy('createdAt', 'desc');
            }

            window.candUnsub = query.onSnapshot(snap => {
                candidatesData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Sort by extracted number from candidate chest number
                candidatesData.sort((a, b) => {
                    const numA = parseInt(String(a.chestNo || '').replace(/\D/g, ''), 10) || 0;
                    const numB = parseInt(String(b.chestNo || '').replace(/\D/g, ''), 10) || 0;
                    if (numA !== numB) return numA - numB;
                    return String(a.chestNo || '').localeCompare(String(b.chestNo || ''), undefined, { numeric: true, sensitivity: 'base' });
                });
                renderUI();
            });
        }
    </script>
</body>

</html>
