<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files & Documents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            bg: '#f8f9fc',
                            blue: '#2563EB',
                            yellow: '#FFCC4D',
                            yellowHover: '#E5B745'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        i[class^="fi-"] { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f9fafb; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        .dropdown-enter { animation: drop-in 0.15s ease-out forwards; transform-origin: top right; }
        @keyframes drop-in {
            0% { opacity: 0; transform: scale(0.95) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .dragover { border-color: #FFCC4D !important; background-color: #FFFAED !important; }
    </style>
</head>
<body class="bg-brand-bg font-sans min-h-screen p-4 sm:p-6 md:p-8 relative">

    <!-- REMOVED overflow-hidden here so the card can grow naturally -->
    <div class="max-w-[1440px] w-full mx-auto bg-white rounded-xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] p-6 min-h-[600px] flex flex-col">
        
        <!-- HEADER (Always Visible) -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 pb-4 border-b border-gray-100 gap-4">
            <div>
                <h1 class="text-[22px] font-bold text-gray-900 leading-tight">Files</h1>
                <p class="text-[13px] text-gray-500 mt-0.5">Manage your files</p>
            </div>
            
            <div class="flex items-center gap-4 w-full sm:w-auto">
                <div class="hidden md:flex items-center text-[13px] text-gray-500 font-medium gap-5 border-r border-gray-200 pr-5" id="header-stats">
                    <div class="flex items-center gap-2">
                        <div class="relative w-11 h-11 flex items-center justify-center">
                            <svg class="absolute inset-0 w-full h-full transform -rotate-90">
                                <circle id="storage-track" cx="22" cy="22" r="18" fill="none" stroke-width="5" stroke="currentColor" class="text-blue-50"></circle>
                                <circle id="storage-fill" cx="22" cy="22" r="18" fill="none" stroke-width="5" stroke="currentColor" stroke-linecap="round" class="text-brand-blue transition-all duration-500 ease-out" style="stroke-dasharray: 113.097; stroke-dashoffset: 113.097;"></circle>
                            </svg>
                            <span id="storage-percent-text" class="relative text-[10px] font-bold text-brand-blue">0%</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-1.5">
                        <i class="fi fi-rr-database text-gray-400 text-[15px]"></i> 
                        <span id="storage-used">0.00 KB / 2 GB</span>
                    </div>
                    
                    <div class="flex items-center gap-1.5 ml-1">
                        <i class="fi fi-rr-document text-gray-400 text-[15px]"></i> 
                        <span id="total-files-count">0 files</span>
                    </div>
                </div>

                <button id="btn-top-upload" onclick="openUploadView()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-2.5 bg-brand-yellow rounded-lg text-[14px] font-semibold text-gray-900 hover:bg-brand-yellowHover transition-all shadow-sm">
                    Upload Files
                </button>
            </div>
        </div>

        <!-- WORK AREA -->
        <div class="w-full flex-1 flex flex-col relative">

            <!-- ============================== -->
            <!-- LIST & GRID VIEW AREA          -->
            <!-- ============================== -->
            <div id="file-views-container" style="display: flex;" class="flex-1 flex-col w-full">
                <!-- Toolbar -->
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center pb-4 gap-4 sm:gap-0">
                    <div class="flex bg-gray-50 p-1 rounded-lg items-center w-full sm:w-auto border border-gray-100">
                        <button id="btn-table" onclick="switchView('table')" class="bg-white shadow-sm border border-gray-200 text-gray-900 text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center gap-2 transition-all">
                            <i class="fi fi-rr-table-list"></i> Table
                        </button>
                        <button id="btn-cards" onclick="switchView('cards')" class="text-gray-500 hover:text-gray-800 text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center gap-2 transition-all">
                            <i class="fi fi-rr-grid"></i> Cards
                        </button>
                    </div>

                    <div class="relative w-full sm:w-72">
                        <i class="fi fi-rr-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[13px]"></i>
                        <input type="text" id="search-files" oninput="applyFileFilters()" placeholder="Search files..." class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-[13px] focus:outline-none focus:ring-1 focus:ring-brand-blue transition-all">
                    </div>
                </div>

                <!-- TABLE VIEW -->
                <div id="view-table" class="block w-full overflow-x-auto flex-1">
                    <div class="w-full min-w-[1000px]">
                        <div class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-gray-50 rounded-t-lg">
                            <div class="col-span-6 text-[12px] font-semibold text-gray-500 uppercase tracking-wider">File Name</div>
                            <div class="col-span-2 text-[12px] font-semibold text-gray-500 uppercase tracking-wider">Size</div>
                            <div class="col-span-2 text-[12px] font-semibold text-gray-500 uppercase tracking-wider">Date</div>
                            <div class="col-span-2 text-[12px] font-semibold text-gray-500 uppercase tracking-wider text-right">Actions</div>
                        </div>
                        <div id="file-table-list" class="min-h-[200px]">
                            <div class="flex flex-col justify-center items-center py-16">
                                <i class="fi fi-rr-spinner animate-spin text-[30px] text-brand-blue mb-3"></i>
                                <p class="text-[13px] text-gray-500 font-medium">Loading files...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CARDS VIEW -->
                <div id="view-cards" class="hidden flex-1">
                    <div id="file-cards-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-4 min-h-[200px]"></div>
                </div>
            </div>

            <!-- ============================== -->
            <!-- UPLOAD VIEW AREA               -->
            <!-- ============================== -->
            <!-- FIX: Removed justify-center and flex-1 so it naturally stacks and stretches the card downwards -->
            <div id="upload-view-container" style="display: none;" class="w-full flex-col items-center py-6 sm:py-10">
                
                <div class="w-full max-w-3xl flex items-center justify-between mb-8 mx-auto px-4">
                    <button onclick="closeUploadView()" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-600 hover:bg-gray-100 transition-colors shrink-0">
                        <i class="fi fi-rr-arrow-left text-[16px]"></i>
                    </button>
                    <div class="text-center flex-1 px-4">
                        <h2 class="text-[20px] font-bold text-gray-900 mb-1">Upload Files</h2>
                        <p class="text-[13px] text-gray-500">Drag and drop files here or click to browse from your device</p>
                    </div>
                    <div class="w-8 shrink-0"></div> <!-- Spacer to keep text perfectly centered -->
                </div>

                <!-- Added mb-10 to ensure padding at the bottom of the card when full -->
                <div id="upload-box" class="w-full max-w-3xl mx-auto border border-dashed border-gray-300 rounded-2xl p-6 sm:p-10 bg-white flex flex-col items-center transition-all relative mb-10">
                    
                    <input type="file" id="fileInput" class="hidden" multiple onchange="handleFileSelect(event)">
                    
                    <div class="text-gray-600 mb-5"><i class="fi fi-rr-cloud-upload-alt text-[40px]"></i></div>
                    
                    <button onclick="document.getElementById('fileInput').click()" class="flex items-center justify-center gap-2 px-8 py-2.5 bg-brand-yellow rounded-lg text-[14px] font-bold text-gray-900 border-[1.5px] border-gray-900 hover:bg-brand-yellowHover hover:shadow-md transition-all mb-4">
                        <i class="fi fi-rr-plus text-[12px]"></i> Choose Files
                    </button>
                    
                    <p class="text-[13px] text-gray-400 font-medium text-center">or drag and drop files anywhere in this area</p>

                    <div id="selected-files-section" class="hidden w-full mt-10 pt-6 border-t border-gray-100">
                        <h4 class="text-[14px] font-bold text-gray-800 mb-4" id="selected-count-text">Selected Files (0)</h4>
                        
                        <div id="selected-files-list" class="max-h-[250px] overflow-y-auto custom-scrollbar flex flex-col gap-1 pr-2">
                            <!-- JS Injected Files -->
                        </div>

                        <div class="flex justify-end items-center gap-4 mt-6 pt-5 border-t border-gray-100">
                            <button onclick="clearSelectedFiles()" class="text-[13px] font-bold text-gray-500 hover:text-gray-800 px-3 py-2 transition-all">Clear All</button>
                            <button onclick="startCloudinaryUpload()" id="start-upload-btn" class="flex items-center gap-2 px-6 py-2.5 bg-brand-yellow rounded-lg text-[13px] font-bold text-gray-900 border-[1.5px] border-transparent hover:border-gray-900 transition-all shadow-sm">
                                <i class="fi fi-rr-upload text-[12px]"></i> <span id="upload-btn-text">Upload Files</span>
                            </button>
                        </div>

                        <div id="upload-progress-section" class="hidden w-full mt-6 flex flex-col items-center">
                            <span class="text-[13px] font-semibold text-gray-700 mb-2">Uploading files... <span id="upload-percent-text" class="text-brand-blue">0%</span></span>
                            <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                                <div id="upload-progress-bar" class="h-full bg-brand-blue transition-all duration-200" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dropdown Action Menu -->
    <div id="global-file-action-menu" class="hidden fixed w-40 bg-white border border-gray-200 rounded-lg shadow-xl z-[100] py-1 overflow-hidden dropdown-enter">
        <button id="btn-file-view" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-gray-700 hover:bg-gray-50 flex items-center transition-colors">
            <i class="fi fi-rr-eye text-[15px] mr-2.5 text-gray-500"></i> View
        </button>
        <button id="btn-file-download" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-gray-700 hover:bg-gray-50 flex items-center transition-colors">
            <i class="fi fi-rr-download text-[15px] mr-2.5 text-gray-500"></i> Download
        </button>
        <div class="border-t border-gray-100 my-0.5"></div>
        <button id="btn-file-delete" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-red-600 hover:bg-red-50 flex items-center transition-colors">
            <i class="fi fi-rr-trash text-[15px] mr-2.5 text-red-500"></i> Delete
        </button>
    </div>

    <!-- File Preview Modal -->
    <div id="file-preview-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closePreviewModal()"></div>
        <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col mx-4 overflow-hidden dropdown-enter">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 bg-gray-50/80">
                <h3 id="preview-filename" class="text-[15px] font-semibold text-gray-800 truncate pr-4">File Name</h3>
                <button onclick="closePreviewModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 text-gray-500 transition-colors shrink-0">
                    <i class="fi fi-rr-cross"></i>
                </button>
            </div>
            <div id="file-preview-content" class="p-6 overflow-auto flex-1 flex items-center justify-center bg-gray-100 min-h-[300px]">
            </div>
        </div>
    </div>

    <script>
        // Data & State
        let filesData = [];
        let fileSearchQuery = '';
        let activeFileDropdownId = null;
        
        // Upload State
        let selectedFilesArray = [];
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/duexban9y/auto/upload";
        const CLOUDINARY_PRESET = "festiveDB";
        const MAX_STORAGE_BYTES = 2 * 1024 * 1024 * 1024;

        function initFilesModule() {
            let retries = 0;
            const dbCheckInterval = setInterval(() => {
                if (window.db) {
                    clearInterval(dbCheckInterval);
                    setupRealtimeListener();
                } else if (retries > 50) { 
                    clearInterval(dbCheckInterval);
                    renderFilesUI();
                }
                retries++;
            }, 100);
        }

        function setupRealtimeListener() {
            if (window.filesUnsub) window.filesUnsub(); 
            window.filesUnsub = window.db.collection('contentFiles').orderBy('createdAt', 'desc').onSnapshot(snap => {
                filesData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderFilesUI(); 
            }, (error) => {
                console.error("Error fetching real-time files: ", error);
            });
        }

        window.openUploadView = function() {
            document.getElementById('file-views-container').style.display = 'none';
            document.getElementById('upload-view-container').style.display = 'flex';
            document.getElementById('btn-top-upload').style.display = 'none';
        };

        window.closeUploadView = function() {
            document.getElementById('upload-view-container').style.display = 'none';
            document.getElementById('file-views-container').style.display = 'flex';
            document.getElementById('btn-top-upload').style.display = 'flex';
            clearSelectedFiles();
        };

        window.switchView = function(viewName) {
            const viewTable = document.getElementById('view-table');
            const viewCards = document.getElementById('view-cards');
            const btnTable = document.getElementById('btn-table');
            const btnCards = document.getElementById('btn-cards');

            const activeClass = "bg-white shadow-sm border border-gray-200 text-gray-900 text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center gap-2 transition-all";
            const inactiveClass = "text-gray-500 hover:text-gray-800 text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center gap-2 transition-all bg-transparent border border-transparent";

            if (viewName === 'table') {
                viewTable.classList.remove('hidden'); viewCards.classList.add('hidden');
                btnTable.className = activeClass; btnCards.className = inactiveClass;
            } else {
                viewTable.classList.add('hidden'); viewCards.classList.remove('hidden');
                btnTable.className = inactiveClass; btnCards.className = activeClass;
            }
        };

        const uploadBox = document.getElementById('upload-box');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            uploadBox.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        ['dragenter', 'dragover'].forEach(evt => {
            uploadBox.addEventListener(evt, () => uploadBox.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(evt => {
            uploadBox.addEventListener(evt, () => uploadBox.classList.remove('dragover'), false);
        });

        uploadBox.addEventListener('drop', (e) => {
            handleFiles(e.dataTransfer.files);
        });

        window.handleFileSelect = function(event) {
            handleFiles(event.target.files);
            event.target.value = ""; 
        };

        function handleFiles(files) {
            if (!files || files.length === 0) return;
            selectedFilesArray = [...selectedFilesArray, ...Array.from(files)];
            renderSelectedFiles();
        }

        function renderSelectedFiles() {
            const section = document.getElementById('selected-files-section');
            const list = document.getElementById('selected-files-list');
            
            if (selectedFilesArray.length === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            document.getElementById('selected-count-text').innerText = `Selected Files (${selectedFilesArray.length})`;
            document.getElementById('upload-btn-text').innerText = `Upload ${selectedFilesArray.length} Files`;

            let html = '';
            selectedFilesArray.forEach((file, index) => {
                let previewHtml = `<div class="w-10 h-10 rounded bg-gray-50 flex items-center justify-center shrink-0 border border-gray-100"><i class="fi ${getFileIcon(file.type)} text-gray-400 text-[18px]"></i></div>`;
                if(file.type.startsWith('image/')) {
                    previewHtml = `<div class="w-10 h-10 rounded shrink-0 border border-gray-100 overflow-hidden"><img src="${URL.createObjectURL(file)}" class="w-full h-full object-cover"></div>`;
                }

                html += `
                <div class="flex items-center justify-between py-2.5 border-b border-gray-50 last:border-0 group">
                    <div class="flex items-center gap-4 overflow-hidden flex-1 min-w-0 pr-4">
                        ${previewHtml}
                        <div class="flex flex-col truncate min-w-0">
                            <span class="text-[13px] font-bold text-gray-800 truncate" title="${file.name}">${file.name}</span>
                            <span class="text-[12px] text-gray-500 font-medium">${formatBytes(file.size)}</span>
                        </div>
                    </div>
                    <button onclick="removeSelectedFile(${index})" class="text-gray-400 hover:text-red-500 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors shrink-0">
                        <i class="fi fi-rr-cross-small text-[16px]"></i>
                    </button>
                </div>`;
            });
            list.innerHTML = html;
        }

        window.removeSelectedFile = function(index) {
            selectedFilesArray.splice(index, 1);
            renderSelectedFiles();
        }

        window.clearSelectedFiles = function() {
            selectedFilesArray = [];
            document.getElementById('upload-progress-section').classList.add('hidden');
            renderSelectedFiles();
        }

        function uploadSingleFile(file, onProgress) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", CLOUDINARY_PRESET);

                xhr.upload.addEventListener("progress", (e) => {
                    if (e.lengthComputable && onProgress) {
                        onProgress(e.loaded, e.total);
                    }
                });

                xhr.onload = () => {
                    if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
                    else reject(xhr.responseText);
                };
                xhr.onerror = () => reject("Network error");
                
                xhr.open("POST", CLOUDINARY_URL, true);
                xhr.send(formData);
            });
        }

        window.startCloudinaryUpload = async function() {
            if (selectedFilesArray.length === 0) return;

            const btn = document.getElementById('start-upload-btn');
            const progressSection = document.getElementById('upload-progress-section');
            const progressBar = document.getElementById('upload-progress-bar');
            const percentText = document.getElementById('upload-percent-text');
            
            btn.disabled = true;
            btn.classList.add('opacity-70');
            progressSection.classList.remove('hidden');
            
            let totalBytes = selectedFilesArray.reduce((sum, f) => sum + f.size, 0);
            let loadedBytesArray = new Array(selectedFilesArray.length).fill(0);

            try {
                for (let i = 0; i < selectedFilesArray.length; i++) {
                    const file = selectedFilesArray[i];
                    
                    const cloudData = await uploadSingleFile(file, (loaded, total) => {
                        loadedBytesArray[i] = loaded;
                        let totalLoaded = loadedBytesArray.reduce((a,b)=>a+b, 0);
                        let percentage = Math.round((totalLoaded / totalBytes) * 100);
                        progressBar.style.width = percentage + '%';
                        percentText.innerText = percentage + '%';
                    });

                    const docData = {
                        name: file.name,
                        size: file.size,
                        type: file.type || cloudData.resource_type,
                        url: cloudData.secure_url,
                        public_id: cloudData.public_id,
                        createdAt: (typeof firebase !== 'undefined') ? firebase.firestore.FieldValue.serverTimestamp() : new Date()
                    };

                    if (window.db) {
                        await window.db.collection('contentFiles').add(docData);
                    } else {
                        filesData.unshift({ id: Date.now().toString(), ...docData, createdAt: { toDate: () => new Date() } });
                        renderFilesUI();
                    }
                }

                if (typeof showToast === 'function') showToast("✅ All files uploaded successfully!");
                
                setTimeout(() => {
                    closeUploadView();
                    progressBar.style.width = '0%';
                    btn.disabled = false;
                    btn.classList.remove('opacity-70');
                }, 800);

            } catch (error) {
                console.error("Upload Error:", error);
                alert("An error occurred while uploading. Check console for details.");
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        };

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0.00 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        function getFileIcon(type) {
            type = type || '';
            if (type.includes('image')) return 'fi-rr-picture text-brand-blue';
            if (type.includes('pdf')) return 'fi-rr-document text-red-500';
            if (type.includes('video')) return 'fi-rr-video text-purple-500';
            if (type.includes('audio')) return 'fi-rr-music text-yellow-500';
            if (type.includes('zip') || type.includes('rar')) return 'fi-rr-folder-zip text-orange-500';
            return 'fi-rr-file text-gray-500';
        }

        window.applyFileFilters = function() {
            fileSearchQuery = document.getElementById('search-files').value.toLowerCase().trim();
            renderFilesUI();
        };

        function renderFilesUI() {
            const tableList = document.getElementById('file-table-list');
            const cardsList = document.getElementById('file-cards-list');
            
            const filteredData = filesData.filter(f => f.name && f.name.toLowerCase().includes(fileSearchQuery));
            
            document.getElementById('total-files-count').innerText = `${filesData.length} files`;
            let totalStorage = filesData.reduce((acc, f) => acc + (f.size || 0), 0);
            
            document.getElementById('storage-used').innerText = `${formatBytes(totalStorage)} / 2 GB`;
            
            let percent = Math.max(0, Math.min(100, (totalStorage / MAX_STORAGE_BYTES) * 100));
            let displayPercent = percent > 0 && percent < 1 ? percent.toFixed(1) : Math.round(percent);
            
            const radius = 18;
            const circumference = 2 * Math.PI * radius; 
            const offset = circumference - (percent / 100) * circumference;

            const fillCircle = document.getElementById('storage-fill');
            const trackCircle = document.getElementById('storage-track');
            const percentText = document.getElementById('storage-percent-text');

            fillCircle.style.strokeDasharray = circumference;
            fillCircle.style.strokeDashoffset = offset;
            percentText.innerText = `${displayPercent}%`;

            let colorFill, colorTrack, colorText;
            if (percent >= 90) {
                colorFill = "text-red-500"; colorTrack = "text-red-100"; colorText = "text-red-600";
            } else if (percent >= 60) {
                colorFill = "text-orange-500"; colorTrack = "text-orange-100"; colorText = "text-orange-600";
            } else {
                colorFill = "text-brand-blue"; colorTrack = "text-blue-50"; colorText = "text-brand-blue";
            }

            fillCircle.setAttribute("class", `transition-all duration-500 ease-out ${colorFill}`);
            trackCircle.setAttribute("class", colorTrack);
            percentText.className = `relative text-[10px] font-bold ${colorText}`;

            if (filteredData.length === 0) {
                const emptyHTML = `<div class="flex flex-col justify-center items-center py-20"><i class="fi fi-rr-folder-open text-[48px] text-gray-200 mb-4"></i><p class="text-[14px] text-gray-500 font-medium">No files found.</p></div>`;
                tableList.innerHTML = emptyHTML;
                cardsList.innerHTML = `<div class="col-span-full">${emptyHTML}</div>`;
                return;
            }

            let tableHTML = ''; let cardsHTML = '';

            filteredData.forEach(d => {
                const iconClass = getFileIcon(d.type);
                const sizeStr = formatBytes(d.size);
                
                let dateObj = d.createdAt;
                if (d.createdAt && d.createdAt.toDate) dateObj = d.createdAt.toDate();
                const dateStr = dateObj instanceof Date ? dateObj.toLocaleDateString('en-US', { day:'numeric', month:'short', year:'numeric'}) : 'Just now';
                
                let visualEl = `<i class="fi ${iconClass} text-[20px]"></i>`;
                if(d.type && d.type.includes('image') && d.url) {
                    visualEl = `<img src="${d.url}" class="w-full h-full object-cover rounded-md" alt="${d.name}">`;
                }

                tableHTML += `
                <div class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-white hover:bg-gray-50 transition-colors group">
                    <div class="col-span-6 flex items-center gap-4 truncate">
                        <div class="w-11 h-11 rounded-lg bg-gray-50 flex items-center justify-center shrink-0 border border-gray-100 p-0.5">${visualEl}</div>
                        <span class="text-[14px] text-gray-800 font-medium truncate" title="${d.name}">${d.name}</span>
                    </div>
                    <div class="col-span-2 text-[13px] text-gray-500">${sizeStr}</div>
                    <div class="col-span-2 text-[13px] text-gray-500">${dateStr}</div>
                    <div class="col-span-2 flex justify-end relative">
                        <button onclick="openFileMenu('${d.id}', event)" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-gray-400 hover:text-gray-800"><i class="fi fi-rr-menu-dots-vertical text-sm"></i></button>
                    </div>
                </div>`;

                cardsHTML += `
                <div class="bg-white border border-gray-200 rounded-xl p-4 relative shadow-sm hover:shadow-md transition-shadow flex flex-col">
                    <div class="w-full h-36 rounded-lg bg-gray-50 mb-4 flex items-center justify-center border border-gray-100 p-1">
                        ${d.type && d.type.includes('image') && d.url ? `<img src="${d.url}" class="w-full h-full object-cover rounded-md">` : `<i class="fi ${iconClass} text-4xl"></i>`}
                    </div>
                    <div class="flex items-start justify-between">
                        <div class="flex-1 overflow-hidden pr-2">
                            <h3 class="text-[14px] font-semibold text-gray-900 truncate mb-1" title="${d.name}">${d.name}</h3>
                            <div class="flex items-center gap-2 text-[12px] text-gray-500">
                                <span>${sizeStr}</span> • <span>${dateStr}</span>
                            </div>
                        </div>
                        <button onclick="openFileMenu('${d.id}', event)" class="w-8 h-8 shrink-0 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-gray-400"><i class="fi fi-rr-menu-dots-vertical text-[12px]"></i></button>
                    </div>
                </div>`;
            });

            tableList.innerHTML = tableHTML; cardsList.innerHTML = cardsHTML;
        }

        window.openFileMenu = function(id, event) {
            event.stopPropagation();
            if (activeFileDropdownId === id) { window.fileCloseDropdowns(); return; }
            activeFileDropdownId = id;
            
            const btn = event.currentTarget;
            const rect = btn.getBoundingClientRect();
            const menu = document.getElementById('global-file-action-menu');
            
            menu.classList.remove('hidden');
            
            let topPos = rect.bottom + 4;
            if (topPos + menu.offsetHeight > window.innerHeight) topPos = rect.top - menu.offsetHeight - 4;
            
            menu.style.top = topPos + 'px';
            menu.style.left = (rect.right - 144) + 'px';
            
            const file = filesData.find(f => f.id === id);
            
            document.getElementById('btn-file-view').onclick = (e) => { 
                if(e) e.stopPropagation();
                openPreviewModal(file);
                window.fileCloseDropdowns();
            };
            document.getElementById('btn-file-download').onclick = (e) => { 
                window.open(file.url, '_blank'); 
                window.fileCloseDropdowns(); 
            };
            document.getElementById('btn-file-delete').onclick = (e) => { 
                if(e) e.stopPropagation();
                if(confirm("Are you sure you want to delete this file?")) {
                    if (window.db) {
                        window.db.collection('contentFiles').doc(id).delete().then(() => {
                            if (typeof showToast === 'function') showToast("✅ File deleted");
                        });
                    } else {
                        filesData = filesData.filter(f => f.id !== id);
                        renderFilesUI();
                    }
                    window.fileCloseDropdowns();
                }
            };
        };

        window.fileCloseDropdowns = function(event) {
            const menu = document.getElementById('global-file-action-menu');
            if (event && event.type === 'click' && menu && menu.contains(event.target)) return;
            activeFileDropdownId = null;
            if (menu) menu.classList.add('hidden');
        };

        document.addEventListener('click', window.fileCloseDropdowns);
        window.addEventListener('scroll', window.fileCloseDropdowns, true);

        window.openPreviewModal = function(file) {
            const modal = document.getElementById('file-preview-modal');
            const content = document.getElementById('file-preview-content');
            document.getElementById('preview-filename').innerText = file.name;
            
            let type = file.type || '';
            let html = '';
            
            if(type.startsWith('image/')) {
                html = `<img src="${file.url}" class="max-w-full max-h-[75vh] object-contain rounded-md shadow-sm">`;
            } else if(type.startsWith('video/')) {
                html = `<video src="${file.url}" controls class="max-w-full max-h-[75vh] rounded-md shadow-sm outline-none"></video>`;
            } else if(type.includes('pdf')) {
                html = `<iframe src="${file.url}" class="w-full h-[75vh] rounded-md border border-gray-200 bg-white"></iframe>`;
            } else {
                html = `
                <div class="flex flex-col items-center text-center">
                    <i class="fi ${getFileIcon(type)} text-[64px] text-gray-300 mb-5"></i>
                    <p class="text-[15px] text-gray-600 font-medium mb-5">Preview not available for this file type.</p>
                    <a href="${file.url}" target="_blank" class="px-6 py-2.5 bg-brand-yellow rounded-lg text-[14px] font-bold text-gray-900 shadow-sm hover:bg-brand-yellowHover transition-all inline-flex items-center gap-2">
                        <i class="fi fi-rr-download text-[14px]"></i> Download File
                    </a>
                </div>`;
            }
            
            content.innerHTML = html;
            modal.classList.remove('hidden');
        };

        window.closePreviewModal = function() {
            document.getElementById('file-preview-modal').classList.add('hidden');
            document.getElementById('file-preview-content').innerHTML = ''; 
        };

        initFilesModule();
    </script>
</body>
</html>
