<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Templates</title>
    <link rel="icon" href="favicon.ico" sizes="any">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            bg: '#f8f9fc',
                            border: '#e5e7eb',
                            textMuted: '#6b7280',
                            textDark: '#111827',
                            blue: '#134E8E',
                            red: '#C00707',
                            orange: '#FF4400',
                            yellow: '#FFB33F'
                        }
                    }
                }
            }
        }
    </script>
    <style>

        i[class^="fi-"] {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
    </style>
</head>

<body class="bg-transparent text-brand-textDark font-sans h-[100dvh] overflow-hidden w-full relative flex flex-col">

    <main class="flex-1 overflow-y-auto p-4 max-w-[1400px] mx-auto w-full space-y-12">
        <!-- Grade Templates Section -->
        <div>
            <div
                class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <div>
                    <h2 class="text-[1.35rem] font-bold text-gray-800 flex items-center gap-2"><i
                            class="fi fi-rr-document text-brand-blue"></i> Grade Templates</h2>
                    <p class="text-[13px] text-gray-500 mt-1">Define points mapping for different grades (e.g. A: 5, B:
                        3)</p>
                </div>
                <button onclick="openTemplateSidebar('grade')"
                    class="bg-brand-blue text-white px-5 py-2.5 rounded-full text-sm font-bold shadow-md hover:opacity-90 transition-all flex items-center gap-2">
                    <i class="fi fi-rr-add"></i> Add Grade Template
                </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="grade-templates-list">
                <!-- Rendered by JS -->
            </div>
        </div>
    </main>

    <!-- Right Sidebar Overlay -->
    <div id="rightSidebarOverlay" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[60] hidden"
        onclick="closeTemplateSidebar()"></div>

    <!-- Template Sidebar -->
    <div id="templateSidebar"
        class="fixed inset-y-0 right-0 w-[440px] max-w-full bg-white shadow-2xl z-[70] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-100">
        <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <div>
                <h2 class="text-[15px] font-bold text-gray-800" id="templateSidebarTitle">Add Template</h2>
                <p id="templateSidebarSubtitle" class="text-[12px] text-gray-400 mt-0.5">Define name → value mapping</p>
            </div>
            <button type="button" onclick="closeTemplateSidebar()"
                class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-200 hover:text-gray-700 transition-colors"><i
                    class="fi fi-rr-cross text-sm"></i></button>
        </div>

        <div class="p-5 flex-1 overflow-y-auto bg-white space-y-5">
            <input type="hidden" id="tpl-type" value="grade">
            <input type="hidden" id="tpl-edit-id" value="">

            <!-- Template Name -->
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase tracking-wide">Template Name
                    *</label>
                <input type="text" id="tpl-name"
                    style="width: 100%; height: 44px; padding: 0 16px; background-color: #ffffff; border: 2px solid #334155; border-radius: 12px; font-size: 14px; font-weight: 700; color: #0f172a; outline: none; display: block;"
                    placeholder="e.g. Standard Grade">
            </div>

            <!-- Values Mapping -->
            <div class="space-y-4">
                <!-- Input Area -->
                <div style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px;">
                    <label id="tpl-add-label"
                        style="display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;">Add
                        New Entry</label>

                    <div style="display: flex; align-items: center; gap: 8px; width: 100%;">
                        <!-- Name Input -->
                        <div style="width: 55%;">
                            <input type="text" id="tpl-input-label"
                                onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('tpl-input-points').focus();}"
                                style="width: 100%; height: 44px; padding: 0 12px; background-color: #ffffff; border: 2px solid #334155; border-radius: 10px; font-size: 14px; font-weight: 700; color: #0f172a; outline: none; display: block;"
                                placeholder="Name (e.g. A)">
                        </div>

                        <!-- Value Input -->
                        <div style="width: 25%;">
                            <input type="number" id="tpl-input-points"
                                onkeydown="if(event.key==='Enter'){event.preventDefault();addTemplateValueCard();}"
                                style="width: 100%; height: 44px; padding: 0 4px; background-color: #ffffff; border: 2px solid #334155; border-radius: 10px; font-size: 14px; font-weight: 900; color: #0f172a; text-align: center; outline: none; display: block;"
                                placeholder="Value">
                        </div>

                        <!-- Add Button -->
                        <button type="button" id="tpl-add-btn" onclick="addTemplateValueCard()"
                            style="width: 44px; height: 44px; background-color: #134e8e; color: #ffffff; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s;">
                            <i class="fi fi-rr-plus" style="font-size: 16px;"></i>
                        </button>
                    </div>
                </div>

                <!-- List Area -->
                <div>
                    <div class="flex items-center justify-between px-2 mb-2">
                        <label class="text-[11px] font-extrabold text-gray-500 uppercase tracking-widest">Added
                            Entries</label>
                        <div id="tpl-summary-text-header" class="text-[11px] font-bold text-brand-blue"></div>
                    </div>
                    <div id="tpl-cards-container"
                        class="border border-gray-200 rounded-2xl overflow-hidden divide-y divide-gray-100 bg-white">
                        <div id="tpl-empty-msg" class="p-10 text-center text-gray-400 italic text-[13px]">No entries
                            added yet. Fill above and click + to add.</div>
                    </div>
                </div>
            </div>

            <!-- Summary badge -->
            <div id="tpl-summary" style="display: none;"
                class="flex items-center gap-2 text-[12px] text-gray-500 bg-blue-50 border border-blue-100 rounded-lg px-3 py-2 mt-2">
                <i class="fi fi-rr-info text-brand-blue text-xs"></i>
                <span id="tpl-summary-text"></span>
            </div>
        </div>

        <div class="p-5 border-t border-gray-100 bg-white flex gap-3">
            <button type="button" onclick="closeTemplateSidebar()"
                class="flex-1 py-2.5 border border-gray-200 rounded-xl text-[13px] font-semibold text-gray-600 hover:bg-gray-50 transition-all">Cancel</button>
            <button type="button" onclick="saveTemplate()"
                class="flex-1 bg-brand-blue text-white py-2.5 rounded-xl text-[13px] font-bold hover:opacity-90 shadow-md transition-all flex items-center justify-center gap-2">
                <i class="fi fi-rr-disk text-sm"></i> Save Template
            </button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCKA0k_9UgoJX_RBgEsIeNdiW2w0Okko1o",
            authDomain: "festie-s1u2h3.firebaseapp.com",
            projectId: "festie-s1u2h3",
            storageBucket: "festie-s1u2h3.firebasestorage.app",
            messagingSenderId: "794049194885",
            appId: "1:794049194885:web:8f75f0df4c15cde15eb2ec"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ── Auth Guard ─────────────────────────────────────────────────
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'index.html';

        function showToast(msg) {
            Toastify({
                text: msg, duration: 2500, gravity: "top", position: "center",
                style: { background: "#fff", color: "#333", boxShadow: "0 4px 15px -3px rgba(0,0,0,0.1)", borderRadius: "10px", border: "1px solid #eaeaea", padding: "12px 24px", fontSize: "14px", fontFamily: "'Inter',sans-serif", display: "flex", gap: "8px", alignItems: "center" },
                escapeMarkup: false
            }).showToast();
        }

        let allTemplates = [];
        let currentTemplateValues = [];
        let editingTemplateValueIndex = -1;

        db.collection('gradeTemplates').onSnapshot(snap => {
            allTemplates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderAllTemplates();
        });

        function renderAllTemplates() {
            const container = document.getElementById('grade-templates-list');
            if (allTemplates.length === 0) {
                container.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-20 opacity-40">
                    <i class="fi fi-rr-document text-4xl mb-3 text-gray-400"></i>
                    <p class="text-[13px] font-medium text-gray-500">No grade templates defined yet.</p>
                </div>`;
            } else {
                container.innerHTML = allTemplates.map(t => renderTemplateCard(t, 'grade')).join('');
            }
        }

        function renderTemplateCard(t, type) {
            const rowsHtml = (t.values || []).map(v =>
                `<div class="grid grid-cols-2 gap-2 py-1.5 border-b border-gray-50 last:border-0 hover:bg-gray-50/50 px-2 rounded-md transition-colors">
                    <span class="text-[13px] font-bold text-gray-700">${v.label}</span>
                    <span class="text-[13px] font-bold text-brand-blue">${v.points} <span class="text-[10px] text-gray-400 font-medium">pts</span></span>
                </div>`
            ).join('');

            return `<div class="bg-white border border-gray-100 rounded-2xl shadow-[0_2px_15px_-3px_rgba(0,0,0,0.02)] hover:shadow-[0_8px_30px_-4px_rgba(0,0,0,0.06)] hover:border-brand-blue/30 transition-all duration-300 relative group flex flex-col min-h-[220px]">
                <div class="flex justify-between items-start p-5 pb-4 border-b border-gray-50">
                    <div>
                        <h3 class="font-bold text-[15px] text-gray-900 leading-tight flex items-center gap-2">
                            <i class="fi fi-rr-document text-brand-blue/70"></i>
                            ${t.name}
                        </h3>
                        <span class="text-[11px] font-semibold text-gray-400 mt-1 inline-block bg-gray-50 px-2 py-0.5 rounded-md border border-gray-100">
                            ${(t.values || []).length} grade entries
                        </span>
                    </div>
                    <div class="flex gap-1.5 transition-opacity opacity-0 group-hover:opacity-100">
                        <button onclick="openTemplateSidebar('${type}', '${t.id}')" title="Edit"
                            class="w-8 h-8 rounded-full flex items-center justify-center text-brand-blue hover:bg-blue-50 transition-all bg-white border border-gray-100 hover:border-blue-200 shadow-sm">
                            <i class="fi fi-rr-edit text-[11px]"></i>
                        </button>
                        <button onclick="deleteTemplate('${type}', '${t.id}')" title="Delete"
                            class="w-8 h-8 rounded-full flex items-center justify-center text-red-500 hover:bg-red-50 transition-all bg-white border border-gray-100 hover:border-red-200 shadow-sm">
                            <i class="fi fi-rr-trash text-[11px]"></i>
                        </button>
                    </div>
                </div>
                <div class="px-3 pt-3 pb-5 flex-1 flex flex-col bg-gray-50/30 rounded-b-2xl">
                    <div class="grid grid-cols-2 gap-2 pb-2 mb-1 px-2">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Grade Name</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Points</span>
                    </div>
                    <div class="flex-1 overflow-y-auto pr-1 space-y-0.5 max-h-[160px] custom-scrollbar">
                        ${rowsHtml || '<div class="px-2 py-4 text-center"><span class="text-[12px] text-gray-400 italic">No values defined</span></div>'}
                    </div>
                </div>
            </div>`;
        }

        // Sidebar Actions
        function openTemplateSidebar(type, id = null) {
            document.getElementById('tpl-edit-id').value = id || '';
            document.getElementById('templateSidebarTitle').innerText = (id ? 'Edit ' : 'Add ') + 'Grade Template';

            const nameInput = document.getElementById('tpl-name');
            nameInput.value = '';

            document.getElementById('tpl-input-label').value = '';
            document.getElementById('tpl-input-points').value = '';

            currentTemplateValues = [];
            editingTemplateValueIndex = -1;

            const addBtn = document.getElementById('tpl-add-btn');
            addBtn.innerHTML = '<i class="fi fi-rr-plus" style="font-size: 16px;"></i>';
            addBtn.style.backgroundColor = '#134e8e';

            if (id) {
                const tpl = allTemplates.find(x => x.id === id);
                if (tpl) {
                    nameInput.value = tpl.name;
                    if (tpl.values) currentTemplateValues = JSON.parse(JSON.stringify(tpl.values));
                }
            }

            renderTemplateValueCards();
            document.getElementById('rightSidebarOverlay').classList.remove('hidden');
            document.getElementById('templateSidebar').classList.remove('translate-x-full');
            setTimeout(() => nameInput.focus(), 320);
        }

        function closeTemplateSidebar() {
            document.getElementById('templateSidebar').classList.add('translate-x-full');
            document.getElementById('rightSidebarOverlay').classList.add('hidden');
        }

        function renderTemplateValueCards() {
            const container = document.getElementById('tpl-cards-container');
            const summary = document.getElementById('tpl-summary');
            const sumText = document.getElementById('tpl-summary-text');
            const sumTextH = document.getElementById('tpl-summary-text-header');

            if (currentTemplateValues.length === 0) {
                container.innerHTML = '<div class="px-4 py-8 text-center" id="tpl-empty-msg"><i class="fi fi-rr-box-open text-3xl mb-3 text-gray-300 block"></i><span class="text-[13px] font-bold text-gray-400">No entries added yet</span><p class="text-[11px] text-gray-400 mt-1">Fill the details above and click + to add.</p></div>';
                summary.style.display = 'none';
                sumTextH.textContent = '';
                return;
            }

            container.innerHTML = currentTemplateValues.map((v, index) => `
                <div class="flex items-center justify-between p-3.5 hover:bg-gray-50 transition-colors group border-b border-gray-50 last:border-0 relative ${editingTemplateValueIndex === index ? 'bg-blue-50/20' : ''}">
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <div class="w-9 h-9 rounded-xl ${editingTemplateValueIndex === index ? 'bg-blue-50 border-blue-200' : 'bg-gray-50 border-gray-100'} border flex items-center justify-center text-brand-blue font-black text-[13px] shrink-0 transition-colors shadow-sm">
                            ${v.points}
                        </div>
                        <div class="truncate text-[13.5px] font-bold text-gray-800 pr-2">${v.label}</div>
                    </div>
                    <div class="flex items-center gap-1.5 transition-opacity shrink-0">
                        <button type="button" onclick="editTemplateValueCard(${index})"
                            class="w-7 h-7 flex items-center justify-center rounded-lg text-brand-blue hover:bg-blue-50 transition-all border border-transparent hover:border-blue-100 shadow-sm bg-white" title="Edit">
                            <i class="fi fi-rr-edit text-[11px]"></i>
                        </button>
                        <button type="button" onclick="removeTemplateValueCard(${index})"
                            class="w-7 h-7 flex items-center justify-center rounded-lg text-red-500 hover:bg-red-50 transition-all border border-transparent hover:border-red-100 shadow-sm bg-white" title="Remove">
                            <i class="fi fi-rr-trash text-[11px]"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            const total = currentTemplateValues.reduce((s, v) => s + Number(v.points), 0);
            summary.classList.remove('hidden');
            summary.style.display = 'flex';
            sumText.textContent = `${currentTemplateValues.length} entry(s) · Total Points: ${total}`;
            sumTextH.textContent = `Total Points: ${total}`;
        }

        function editTemplateValueCard(index) {
            const val = currentTemplateValues[index];
            document.getElementById('tpl-input-label').value = val.label;
            document.getElementById('tpl-input-points').value = val.points;
            editingTemplateValueIndex = index;
            document.getElementById('tpl-input-label').focus();

            document.getElementById('tpl-add-label').innerText = 'Edit Entry';
            const btn = document.getElementById('tpl-add-btn');
            btn.innerHTML = '<i class="fi fi-rr-check" style="font-size: 16px;"></i>';
            btn.style.backgroundColor = '#10B981'; // green-500
        }

        function addTemplateValueCard() {
            const labelInput = document.getElementById('tpl-input-label');
            const pointsInput = document.getElementById('tpl-input-points');
            const label = labelInput.value.trim();
            const points = pointsInput.value;

            if (!label || points === '') return showToast('<b>❌</b> Please fill both name and value.');

            if (editingTemplateValueIndex === -1) {
                if (currentTemplateValues.some(v => v.label.toLowerCase() === label.toLowerCase())) {
                    return showToast('<b>⚠️</b> Name "' + label + '" already exists.');
                }
                currentTemplateValues.push({ label: label, points: Number(points) });
            } else {
                if (currentTemplateValues.some((v, idx) => idx !== editingTemplateValueIndex && v.label.toLowerCase() === label.toLowerCase())) {
                    return showToast('<b>⚠️</b> Name "' + label + '" already exists.');
                }
                currentTemplateValues[editingTemplateValueIndex] = { label: label, points: Number(points) };
                editingTemplateValueIndex = -1;
                document.getElementById('tpl-add-label').innerText = 'Add New Entry';
                const btn = document.getElementById('tpl-add-btn');
                btn.innerHTML = '<i class="fi fi-rr-plus" style="font-size: 16px;"></i>';
                btn.style.backgroundColor = '#134e8e';
            }

            labelInput.value = '';
            pointsInput.value = '';
            labelInput.focus();
            renderTemplateValueCards();
        }

        function removeTemplateValueCard(index) {
            currentTemplateValues.splice(index, 1);
            if (editingTemplateValueIndex === index) {
                editingTemplateValueIndex = -1;
                document.getElementById('tpl-input-label').value = '';
                document.getElementById('tpl-input-points').value = '';
                document.getElementById('tpl-add-label').innerText = 'Add New Entry';
                const btn = document.getElementById('tpl-add-btn');
                btn.innerHTML = '<i class="fi fi-rr-plus" style="font-size: 16px;"></i>';
                btn.style.backgroundColor = '#134e8e';
            } else if (editingTemplateValueIndex > index) {
                editingTemplateValueIndex--;
            }
            renderTemplateValueCards();
        }

        function saveTemplate() {
            const name = document.getElementById('tpl-name').value.trim();
            const editId = document.getElementById('tpl-edit-id').value;

            if (!name) return showToast('<b>❌</b> Template Name is required.');
            if (currentTemplateValues.length === 0) return showToast('<b>❌</b> Add at least one value & point pair.');

            const payload = { name, values: currentTemplateValues, type: 'grade', updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
            const col = 'gradeTemplates';

            const btn = document.querySelector('#templateSidebar button[onclick="saveTemplate()"]');
            const origHTML = btn ? btn.innerHTML : '';
            if (btn) { btn.disabled = true; btn.innerHTML = '<div class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></div> Saving…'; }

            const done = () => { showToast('<b>✅</b> Template ' + (editId ? 'updated' : 'added') + '!'); closeTemplateSidebar(); if (btn) { btn.disabled = false; btn.innerHTML = origHTML; } };
            const fail = (err) => { showToast('<b>❌</b> ' + err.message); if (btn) { btn.disabled = false; btn.innerHTML = origHTML; } };

            if (editId) {
                db.collection(col).doc(editId).update(payload).then(done).catch(fail);
            } else {
                payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                db.collection(col).add(payload).then(done).catch(fail);
            }
        }

        function deleteTemplate(type, id) {
            if (confirm('Are you sure you want to delete this template?')) {
                db.collection('gradeTemplates').doc(id).delete()
                    .then(() => showToast('<b>🗑️</b> Template deleted.'))
                    .catch(err => showToast('<b>❌</b> ' + err.message));
            }
        }

    </script>
</body>

</html>
