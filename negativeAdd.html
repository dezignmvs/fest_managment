<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negative Marks Management</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Uicons -->
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#134E8E',
                            gold: '#FFB33F',
                            red: '#C00707',
                            orange: '#FF4400',
                            bg: '#f8f9fc'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        i[class^="fi-"] { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
        
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .table-row-hover:hover { background-color: #f9fafb; }
        
        /* Sidebar Transition */
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        /* Fingerprint Animation */
        .fingerprint-scan { animation: pulse-border 2s infinite; }
        @keyframes pulse-border {
            0% { border-color: #f3f4f6; box-shadow: 0 0 0 0 rgba(19, 78, 142, 0.4); }
            50% { border-color: #134E8E; box-shadow: 0 0 0 10px rgba(19, 78, 142, 0); }
            100% { border-color: #f3f4f6; box-shadow: 0 0 0 0 rgba(19, 78, 142, 0); }
        }

        /* Dropdown animation */
        .dropdown-enter { animation: drop-in 0.15s ease-out forwards; transform-origin: top right; }
        @keyframes drop-in {
            0% { opacity: 0; transform: scale(0.95) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>

<body class="bg-brand-bg font-sans min-h-screen p-4 sm:p-6 md:p-8">
    <div class="max-w-full w-full mx-auto relative">
        
        <!-- Header Section -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl sm:text-[22px] font-semibold text-gray-900 leading-tight">Negative Marks</h1>
                <p class="text-[12px] sm:text-[13px] text-gray-500 mt-0.5 sm:mt-1">Manage disciplinary mark deductions</p>
            </div>
            <div class="flex items-center ml-4">
                <button onclick="window.openAddSidebar()" class="flex items-center justify-center gap-2 w-10 h-10 sm:w-auto sm:px-5 sm:py-2.5 bg-brand-red border border-transparent rounded-full text-[13px] font-bold text-white hover:bg-opacity-90 transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 whitespace-nowrap p-0">
                    <i class="fi fi-rr-minus-circle text-sm sm:text-[13px]"></i>
                    <span class="hidden sm:block">Add Minus</span>
                </button>
            </div>
        </div>

        <!-- Main Card Area -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] overflow-hidden">
            <!-- Toolbar -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 border-b border-gray-100 gap-4 sm:gap-0">
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="relative w-full sm:w-64">
                        <i class="fi fi-rr-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="search-neg" oninput="window.handleNegSearch(this.value)" placeholder="Search candidates or purpose..." 
                            class="w-full pl-8 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full text-[13px] focus:outline-none focus:ring-2 focus:ring-brand-red/30 focus:border-brand-red transition-all">
                    </div>
                </div>
            </div>

            <!-- TABLE VIEW -->
            <div class="block w-full overflow-x-auto no-scrollbar">
                <div class="min-w-[1000px]">
                    <div class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-[#FAFAFA]">
                        <div class="col-span-1 text-[13px] font-medium text-gray-700 text-center">#</div>
                        <div class="col-span-4 text-[13px] font-medium text-gray-700">Candidates</div>
                        <div class="col-span-3 text-[13px] font-medium text-gray-700">Purpose</div>
                        <div class="col-span-2 text-[13px] font-medium text-gray-700 text-center">Marks</div>
                        <div class="col-span-1 text-[13px] font-medium text-gray-700 text-center">Status</div>
                        <div class="col-span-1 text-[13px] font-medium text-gray-700 text-right pr-4">Actions</div>
                    </div>
                    
                    <div id="neg-marks-list" class="divide-y divide-gray-50">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="flex flex-col sm:flex-row justify-between items-center py-3 px-6 bg-white border-t border-gray-100 text-[13px] text-gray-600">
                <div id="showing-text">Showing 0 entries</div>
                <div class="flex items-center space-x-4 mt-3 sm:mt-0">
                    <button id="prev-btn" onclick="window.changePage(-1)" class="w-8 h-8 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 hover:text-gray-600 disabled:opacity-50">
                        <i class="fi fi-rr-angle-small-left text-xs"></i>
                    </button>
                    <span id="page-info">Page 1 of 1</span>
                    <button id="next-btn" onclick="window.changePage(1)" class="w-8 h-8 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 hover:text-gray-600 disabled:opacity-50">
                        <i class="fi fi-rr-angle-small-right text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD SIDEBAR -->
    <div id="add-sidebar-overlay" onclick="window.closeAddSidebar()" class="fixed inset-0 bg-gray-900/60 z-[100] hidden backdrop-blur-sm transition-opacity"></div>
    <div id="add-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-[500px] bg-white z-[110] transform translate-x-full sidebar-transition shadow-2xl flex flex-col">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                <i class="fi fi-rr-minus-circle text-brand-red"></i> Add Negative Marks
            </h2>
            <button onclick="window.closeAddSidebar()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400">
                <i class="fi fi-rr-cross text-xs"></i>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Candidate Multi-Select -->
            <div>
                <label class="block text-[13px] font-bold text-gray-700 mb-2">Select Candidates *</label>
                <div class="relative group">
                    <div id="multi-select-display" onclick="window.toggleCandidateDropdown(event)" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-[13px] flex flex-wrap gap-2 min-h-[46px] cursor-pointer hover:border-brand-blue/30 transition-all">
                        <span class="text-gray-400">Choose candidates...</span>
                    </div>
                    
                    <div id="candidate-dropdown" onclick="event.stopPropagation()" class="absolute top-full left-0 right-0 mt-2 bg-white border border-gray-200 rounded-2xl shadow-xl z-20 hidden flex flex-col max-h-[300px] overflow-hidden">
                        <div class="p-3 border-b border-gray-50">
                            <div class="relative">
                                <i class="fi fi-rr-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs text-brand-blue/60 group-focus-within:text-brand-blue transition-colors"></i>
                                <input type="text" id="cand-search-input" oninput="window.filterCands(this.value)" onclick="event.stopPropagation()" placeholder="Search by name or chest no..." class="w-full pl-9 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-[13px] focus:ring-2 focus:ring-brand-blue/20 outline-none transition-all placeholder:text-gray-300">
                            </div>
                        </div>
                        <div id="cand-list-options" class="overflow-y-auto py-2 divide-y divide-gray-50">
                            <!-- Options -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Purpose -->
            <div>
                <label class="block text-[13px] font-bold text-gray-700 mb-2">Purpose / Reason *</label>
                <div class="relative">
                    <select id="neg-purpose" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-[13px] outline-none hover:border-brand-blue/30 focus:border-brand-blue/50 appearance-none">
                        <option value="" disabled selected>Select Purpose</option>
                        <option value="Discipline Issue">Discipline Issue</option>
                        <option value="Rule Violation">Rule Violation</option>
                        <option value="Uniform/ID Mismatch">Uniform/ID Mismatch</option>
                        <option value="Late Arrival">Late Arrival</option>
                        <option value="Other">Other</option>
                    </select>
                    <i class="fi fi-rr-angle-small-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                </div>
            </div>

            <!-- Marks -->
            <div>
                <label class="block text-[13px] font-bold text-gray-700 mb-2">Marks to Deduct *</label>
                <div class="relative">
                    <input type="number" id="neg-marks" placeholder="Enter amount (e.g. 5)" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-[13px] outline-none hover:border-brand-red/30 focus:border-brand-red/50">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[13px] font-black text-brand-red">- Pts</span>
                </div>
            </div>
        </div>

        <div class="p-6 border-t border-gray-100 flex gap-4">
            <button onclick="window.closeAddSidebar()" class="flex-1 py-3 bg-gray-50 rounded-2xl text-[13px] font-bold text-gray-600 hover:bg-gray-100 transition-all">Cancel</button>
            <button id="btn-submit-neg" onclick="window.submitNegativeMarks()" class="flex-2 px-8 py-3 bg-brand-red text-white rounded-2xl text-[13px] font-bold shadow-lg shadow-brand-red/20 hover:opacity-90 active:scale-95 transition-all">Submit Entry</button>
        </div>
    </div>

    <!-- REMOVE SIDEBAR (BIOMETRIC) -->
    <div id="remove-sidebar-overlay" onclick="window.closeRemoveSidebar()" class="fixed inset-0 bg-gray-900/60 z-[120] hidden backdrop-blur-sm transition-opacity"></div>
    <div id="remove-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-[450px] bg-white z-[130] transform translate-x-full sidebar-transition shadow-2xl flex flex-col">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <h2 class="text-lg font-bold text-gray-900">Remove Negative Entry</h2>
            <button onclick="window.closeRemoveSidebar()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400">
                <i class="fi fi-rr-cross text-xs"></i>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-8 space-y-8 flex flex-col">
            <div>
                <label class="block text-[13px] font-bold text-gray-700 mb-3 uppercase tracking-widest">Reason for Removal *</label>
                <textarea id="remove-reason" rows="3" placeholder="Enter valid justification..." class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-[13px] outline-none focus:border-brand-blue resize-none"></textarea>
            </div>

            <div class="flex-1 flex flex-col items-center justify-center p-8 border-2 border-dashed border-gray-100 rounded-[2rem] bg-gray-50/30">
                <div id="fingerprint-btn" onclick="window.simulateScan()" class="w-24 h-24 rounded-full bg-white border-2 border-gray-100 flex items-center justify-center text-gray-400 cursor-pointer hover:shadow-xl transition-all relative">
                    <i class="fi fi-rr-fingerprint text-4xl"></i>
                    <div id="scan-progress" class="absolute inset-0 rounded-full border-4 border-brand-blue border-t-transparent animate-spin hidden"></div>
                </div>
                <p id="scan-label" class="mt-6 text-[12px] font-bold text-gray-400 uppercase tracking-[0.2em]">Touch to Auth Removal</p>
                <p class="mt-2 text-[11px] text-gray-300 italic">Security clearance required for deletion</p>
            </div>
        </div>

        <div class="p-8 border-t border-gray-100">
            <button id="btn-final-remove" disabled onclick="window.confirmRemoval()" class="w-full py-4 bg-gray-100 text-gray-400 rounded-2xl text-[13px] font-bold uppercase tracking-widest transition-all cursor-not-allowed">Waiting for Scan...</button>
        </div>
    </div>

    <!-- Action Dropdown Portal -->
    <div id="action-portal" class="fixed hidden z-[1000] bg-white border border-gray-200 rounded-2xl shadow-xl w-40 overflow-hidden dropdown-enter">
        <button onclick="window.handleRemoveTrigger()" class="w-full px-5 py-3 text-left text-[13px] font-bold text-brand-red hover:bg-red-50 flex items-center gap-3 transition-colors">
            <i class="fi fi-rr-trash"></i> Remove Entry
        </button>
    </div>

    <!-- Firebase & Toastify -->
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        (function() {
            let candidates = [], negMarks = [];
            let selectedCandIds = new Set();
            let currentSearch = '', currentType = 'All', currentPage = 1, perPage = 15;
            let activeNegId = null;

            const db = window.db;
            if (!db) return;

            // Fetch Data
            db.collection('candidates').onSnapshot(snap => {
                candidates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderCandidateOptions();
            });

            db.collection('negativeMarks').orderBy('timestamp', 'desc').onSnapshot(snap => {
                negMarks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderList();
            });

            // UI Rendering
            function renderCandidateOptions() {
                const search = document.getElementById('cand-search-input').value.toLowerCase();
                const filtered = candidates.filter(c => c.name.toLowerCase().includes(search) || (c.chestNo && c.chestNo.toLowerCase().includes(search)));
                let html = '';
                filtered.forEach(c => {
                    const isSelected = selectedCandIds.has(c.id);
                    html += `
                        <div onclick="window.toggleCandSelection('${c.id}', '${c.name}', event)" class="px-4 py-2.5 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition-colors">
                            <div class="flex flex-col">
                                <span class="text-[13px] font-bold text-gray-700">${c.name}</span>
                                <span class="text-[10px] text-gray-400 uppercase tracking-widest">${c.chestNo || 'No Chest'} • ${c.team || 'No Team'}</span>
                            </div>
                            <div class="w-5 h-5 rounded-md border-2 ${isSelected ? 'bg-brand-blue border-brand-blue' : 'border-gray-200'} flex items-center justify-center transition-all">
                                ${isSelected ? '<i class="fi fi-rr-check text-[10px] text-white"></i>' : ''}
                            </div>
                        </div>
                    `;
                });
                document.getElementById('cand-list-options').innerHTML = html || '<div class="p-6 text-center text-gray-300 text-[12px]">No candidates found</div>';
            }

            function renderList() {
                const s = currentSearch.toLowerCase().trim();
                const filtered = negMarks.filter(n => {
                    const candMatch = n.candidateNames.some(name => name.toLowerCase().includes(s));
                    const purposeMatch = n.purpose.toLowerCase().includes(s);
                    return candMatch || purposeMatch;
                });

                const total = filtered.length;
                const pages = Math.ceil(total / perPage) || 1;
                if(currentPage > pages) currentPage = pages;
                const start = (currentPage - 1) * perPage;
                const paginated = filtered.slice(start, start + perPage);

                document.getElementById('showing-text').innerText = `Showing ${filtered.length} entries`;
                document.getElementById('page-info').innerText = `Page ${currentPage} of ${pages}`;
                document.getElementById('prev-btn').disabled = currentPage === 1;
                document.getElementById('next-btn').disabled = currentPage === pages;

                let html = '';
                paginated.forEach((n, idx) => {
                    const date = n.timestamp?.toDate() ? n.timestamp.toDate().toLocaleDateString() : 'Just now';
                    const candSummary = n.candidateNames.join(', ');
                    const isRemoved = n.status === 'Removed';
                    
                    html += `
                        <div class="grid grid-cols-12 gap-4 items-center py-4 px-6 table-row-hover transition-colors ${isRemoved ? 'opacity-50' : ''}">
                            <div class="col-span-1 text-[13px] font-medium text-gray-400 text-center">${start + idx + 1}</div>
                            <div class="col-span-4 flex flex-col min-w-0 pr-4">
                                <span class="text-[14px] font-semibold text-gray-900 leading-tight truncate" title="${candSummary}">${candSummary}</span>
                                <span class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest">${date}</span>
                            </div>
                            <div class="col-span-3 text-[13px] font-medium text-gray-600 truncate">${n.purpose}</div>
                            <div class="col-span-2 text-[14px] font-black text-brand-red text-center">-${n.marks}</div>
                            <div class="col-span-1 text-center">
                                <span class="px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${isRemoved ? 'bg-gray-100 text-gray-400' : 'bg-red-50 text-brand-red'}">
                                    ${n.status || 'Active'}
                                </span>
                            </div>
                            <div class="col-span-1 text-right relative pr-4">
                                ${!isRemoved ? `
                                <button onclick="window.toggleActionMenu('${n.id}', event)" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 transition-colors ml-auto">
                                    <i class="fi fi-rr-menu-dots-vertical text-xs"></i>
                                </button>
                                ` : `
                                <i class="fi fi-rr-lock text-gray-200 text-xs" title="Removal Reason: ${n.removalReason || 'N/A'}"></i>
                                `}
                            </div>
                        </div>
                    `;
                });
                document.getElementById('neg-marks-list').innerHTML = html || '<div class="py-16 text-center text-gray-300">No records found. Click "Add Minus" to create one.</div>';
            }

            // Expose Handlers
            window.openAddSidebar = () => {
                document.getElementById('add-sidebar-overlay').classList.remove('hidden');
                document.getElementById('add-sidebar').classList.remove('translate-x-full');
                renderCandidateOptions(); // Ensure options are fresh
            };

            window.closeAddSidebar = () => {
                document.getElementById('add-sidebar-overlay').classList.add('hidden');
                document.getElementById('add-sidebar').classList.add('translate-x-full');
                selectedCandIds.clear();
                document.getElementById('multi-select-display').innerHTML = '<span class="text-gray-400">Choose candidates...</span>';
                document.getElementById('neg-marks').value = '';
                document.getElementById('neg-purpose').value = '';
                document.getElementById('cand-search-input').value = '';
                document.getElementById('candidate-dropdown').classList.add('hidden');
            };

            window.toggleCandidateDropdown = (e) => {
                e.stopPropagation();
                const dropdown = document.getElementById('candidate-dropdown');
                const isShowing = !dropdown.classList.contains('hidden');
                
                if(!isShowing) {
                    dropdown.classList.remove('hidden');
                    document.getElementById('cand-search-input').focus();
                } else {
                    dropdown.classList.add('hidden');
                }
            };

            window.toggleCandSelection = (id, name, e) => {
                e.stopPropagation();
                if(selectedCandIds.has(id)) selectedCandIds.delete(id);
                else selectedCandIds.add(id);
                
                renderCandidateOptions();
                updateSelectionUI();
            };

            function updateSelectionUI() {
                const display = document.getElementById('multi-select-display');
                if(selectedCandIds.size === 0) {
                    display.innerHTML = '<span class="text-gray-400">Choose candidates...</span>';
                    return;
                }
                let tags = '';
                selectedCandIds.forEach(id => {
                    const c = candidates.find(can => can.id === id);
                    if(c) tags += `<span class="px-2 py-1 bg-brand-blue text-white rounded-lg flex items-center gap-2 text-[11px] font-bold animation-in fade-in zoom-in duration-200 hover:bg-brand-blue/90" onclick="window.toggleCandSelection('${id}', '', event)">${c.name} <i class="fi fi-rr-cross-small"></i></span>`;
                });
                display.innerHTML = tags;
            }

            window.filterCands = (val) => renderCandidateOptions();

            window.submitNegativeMarks = async () => {
                const marks = document.getElementById('neg-marks').value;
                const purpose = document.getElementById('neg-purpose').value;
                
                if(selectedCandIds.size === 0) return alert('Select at least one candidate');
                if(!purpose) return alert('Select a purpose');
                if(!marks || marks <= 0) return alert('Enter valid marks to deduct');

                const btn = document.getElementById('btn-submit-neg');
                btn.disabled = true; btn.innerText = 'Submitting...';

                try {
                    const names = [];
                    const teamNames = [];
                    selectedCandIds.forEach(id => {
                        const c = candidates.find(can => can.id === id);
                        if(c) {
                            names.push(c.name);
                            if(c.team) teamNames.push(c.team);
                        }
                    });

                    await db.collection('negativeMarks').add({
                        candidateIds: Array.from(selectedCandIds),
                        candidateNames: names,
                        teams: teamNames,
                        purpose: purpose,
                        marks: parseInt(marks),
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        status: 'Active'
                    });

                    Toastify({ text: "Negative marks added successfully", backgroundColor: "#134E8E" }).showToast();
                    window.closeAddSidebar();
                } catch (e) {
                    alert('Error: ' + e.message);
                } finally {
                    btn.disabled = false; btn.innerText = 'Submit Entry';
                }
            };

            window.toggleActionMenu = (id, e) => {
                e.stopPropagation();
                activeNegId = id;
                const portal = document.getElementById('action-portal');
                const rect = e.currentTarget.getBoundingClientRect();
                portal.style.top = (rect.bottom + window.scrollY + 5) + 'px';
                portal.style.left = (rect.right - 160) + 'px';
                portal.classList.remove('hidden');
            };

            window.handleRemoveTrigger = () => {
                document.getElementById('action-portal').classList.add('hidden');
                document.getElementById('remove-sidebar-overlay').classList.remove('hidden');
                document.getElementById('remove-sidebar').classList.remove('translate-x-full');
            };

            window.closeRemoveSidebar = () => {
                document.getElementById('remove-sidebar-overlay').classList.add('hidden');
                document.getElementById('remove-sidebar').classList.add('translate-x-full');
                document.getElementById('remove-reason').value = '';
                document.getElementById('btn-final-remove').disabled = true;
                document.getElementById('btn-final-remove').innerText = 'Waiting for Scan...';
                document.getElementById('btn-final-remove').className = 'w-full py-4 bg-gray-100 text-gray-400 rounded-2xl text-[13px] font-bold uppercase tracking-widest transition-all cursor-not-allowed';
                document.getElementById('fingerprint-btn').className = 'w-24 h-24 rounded-full bg-white border-2 border-gray-100 flex items-center justify-center text-gray-400 cursor-pointer hover:shadow-xl transition-all relative';
                document.getElementById('scan-label').innerText = 'Touch to Auth Removal';
            };

            window.simulateScan = () => {
                const btn = document.getElementById('fingerprint-btn');
                const progress = document.getElementById('scan-progress');
                const label = document.getElementById('scan-label');
                
                btn.className = 'w-24 h-24 rounded-full bg-white border-4 border-brand-blue flex items-center justify-center text-brand-blue cursor-pointer shadow-xl relative fingerprint-scan';
                progress.classList.remove('hidden');
                label.innerText = 'Scanning...';

                setTimeout(() => {
                    progress.classList.add('hidden');
                    btn.className = 'w-24 h-24 rounded-full bg-brand-blue flex items-center justify-center text-white cursor-pointer shadow-xl relative';
                    label.innerText = 'Scanned Successful';
                    
                    const finalBtn = document.getElementById('btn-final-remove');
                    finalBtn.disabled = false;
                    finalBtn.innerText = 'Confirm Removal';
                    finalBtn.className = 'w-full py-4 bg-brand-red text-white rounded-2xl text-[13px] font-bold uppercase tracking-widest shadow-xl shadow-brand-red/20 active:scale-95 transition-all';
                }, 1500);
            };

            window.confirmRemoval = async () => {
                const reason = document.getElementById('remove-reason').value.trim();
                if(!reason) return alert('Enter a removal reason');

                const btn = document.getElementById('btn-final-remove');
                btn.disabled = true; btn.innerText = 'Removing...';

                try {
                    await db.collection('negativeMarks').doc(activeNegId).update({
                        status: 'Removed',
                        removalReason: reason,
                        removedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    Toastify({ text: "Entry removed successfully", backgroundColor: "#C00707" }).showToast();
                    window.closeRemoveSidebar();
                } catch (e) {
                    alert('Error: ' + e.message);
                }
            };

            window.handleNegSearch = (v) => { currentSearch = v; currentPage = 1; renderList(); };
            window.changePage = (dir) => { currentPage += dir; renderList(); };

            document.addEventListener('click', () => {
                document.getElementById('action-portal').classList.add('hidden');
                document.getElementById('candidate-dropdown').classList.add('hidden');
            });

        })();
    </script>
</body>

</html>
