<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            bg: '#f8f9fc',
                            blue: '#2563EB',
                            yellow: '#FFCC4D',
                            yellowHover: '#E5B745'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        i[class^="fi-"] { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f9fafb; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="bg-brand-bg font-sans min-h-screen p-4 sm:p-6 md:p-8 relative">

    <!-- MAIN DASHBOARD VIEW -->
    <div class="max-w-[1440px] w-full mx-auto flex flex-col h-[calc(100vh-4rem)]">
        
        <!-- HEADER -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <div>
                <h1 class="text-[22px] font-bold text-gray-900 leading-tight">Downloads</h1>
                <p class="text-[13px] text-gray-500 mt-0.5">Manage your downloads</p>
            </div>
            
            <button onclick="openSidebar()" class="flex items-center justify-center gap-2 px-5 py-2 bg-brand-yellow rounded-lg text-[13px] font-bold text-gray-900 hover:bg-brand-yellowHover transition-all shadow-sm">
                <i class="fi fi-rr-plus text-[12px]"></i> Create Download
            </button>
        </div>

        <!-- CONTENT CARD -->
        <div class="w-full flex-1 bg-white rounded-xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] flex flex-col overflow-hidden">
            
            <!-- Toolbar -->
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <!-- View Toggle -->
                <div class="flex bg-white border border-gray-200 p-1 rounded-full items-center gap-1 shadow-sm">
                    <button id="btn-grid" onclick="switchView('grid')" class="text-gray-500 hover:text-gray-800 text-[13px] font-medium py-1.5 px-4 rounded-full flex items-center gap-2 transition-all">
                        <i class="fi fi-rr-grid text-[14px]"></i> Grid
                    </button>
                    <button id="btn-list" onclick="switchView('list')" class="bg-brand-yellow text-gray-900 text-[13px] font-bold py-1.5 px-4 rounded-full flex items-center gap-2 transition-all shadow-sm">
                        <i class="fi fi-rr-list text-[14px]"></i> List
                    </button>
                </div>

                <!-- Actions (Search/Filter) -->
                <div class="flex items-center gap-4 text-gray-400">
                    <button class="hover:text-gray-700 transition-colors"><i class="fi fi-rr-search text-[16px]"></i></button>
                    <button class="hover:text-gray-700 transition-colors"><i class="fi fi-rr-filter text-[16px]"></i></button>
                </div>
            </div>

            <!-- List View (Table) -->
            <div id="view-list" class="flex-1 flex flex-col w-full overflow-hidden">
                <div class="w-full overflow-x-auto flex-1 custom-scrollbar">
                    <div class="min-w-[900px]">
                        <!-- Table Header -->
                        <div class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-gray-50/50">
                            <div class="col-span-1 flex justify-center"><div class="w-4 h-4 rounded-full border-2 border-brand-yellow"></div></div>
                            <div class="col-span-4 text-[12px] font-semibold text-gray-600">Title & Description</div>
                            <div class="col-span-2 text-[12px] font-semibold text-gray-600 text-center">Category</div>
                            <div class="col-span-3 text-[12px] font-semibold text-gray-600 text-center">Download</div>
                            <div class="col-span-2 text-[12px] font-semibold text-gray-600 text-right pr-4">Actions</div>
                        </div>
                        
                        <!-- Table Body -->
                        <div id="table-body" class="flex flex-col">
                            <!-- Empty State -->
                            <div id="empty-state" class="flex flex-col justify-center items-center py-24 text-center">
                                <p class="text-[13px] text-gray-500 font-medium">No downloads found</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Grid View (Cards) -->
            <div id="view-grid" class="hidden flex-1 p-6 overflow-y-auto custom-scrollbar">
                <div id="grid-body" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- Pagination Footer -->
            <div class="px-6 py-4 border-t border-gray-100 flex justify-between items-center bg-white">
                <div class="flex items-center gap-2 text-[13px] text-gray-600">
                    Showing <span id="page-start">0</span> to <span id="page-end">0</span> of <span id="total-results">0</span> results 
                    <span class="mx-1">•</span>
                    <select class="border border-gray-200 rounded-md px-2 py-1 bg-white focus:outline-none focus:border-brand-yellow">
                        <option>10</option>
                        <option>20</option>
                        <option>50</option>
                    </select>
                </div>
                
                <div class="flex items-center gap-3">
                    <button class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-400 hover:bg-gray-50 transition-colors disabled:opacity-50"><i class="fi fi-rr-angle-left text-[12px]"></i></button>
                    <span id="page-indicator" class="text-[13px] text-gray-600 font-medium">Page 1 of 0</span>
                    <button class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-400 hover:bg-gray-50 transition-colors disabled:opacity-50"><i class="fi fi-rr-angle-right text-[12px]"></i></button>
                </div>
            </div>

        </div>
    </div>

    <!-- ============================================== -->
    <!-- CREATE DOWNLOAD SIDEBAR (RIGHT DRAWER)         -->
    <!-- ============================================== -->
    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[100] opacity-0 transition-opacity duration-300" onclick="closeSidebar()"></div>
    
    <div id="create-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-[110] translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        
        <!-- Sidebar Header -->
        <div class="flex justify-between items-center px-6 py-5 border-b border-gray-100">
            <h2 class="text-[18px] font-bold text-gray-900">Create New Download</h2>
            <button type="button" onclick="closeSidebar()" class="text-gray-400 hover:text-gray-700 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
                <i class="fi fi-rr-cross text-[14px]"></i>
            </button>
        </div>

        <!-- Sidebar Form -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
            <form id="create-form" onsubmit="handleCreateDownload(event)" class="flex flex-col gap-5">
                
                <!-- Title -->
                <div>
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Title <span class="text-red-500">*</span></label>
                    <input type="text" id="dl-title" required placeholder="Enter download title" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg text-[13px] focus:outline-none focus:border-brand-yellow focus:ring-1 focus:ring-brand-yellow transition-all">
                </div>

                <!-- Category -->
                <div>
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Category</label>
                    <div class="relative">
                        <select id="dl-category" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg text-[13px] appearance-none focus:outline-none focus:border-brand-yellow focus:ring-1 focus:ring-brand-yellow transition-all">
                            <option value="" disabled selected>Select category</option>
                            <option value="candidates">Candidates</option>
                            <option value="programs">Programs</option>
                            <option value="schedule">Schedule</option>
                            <option value="concept_note">Concept Note</option>
                            <option value="other">Other</option>
                        </select>
                        <i class="fi fi-rr-angle-small-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Description</label>
                    <textarea id="dl-description" rows="4" placeholder="Enter download description" class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg text-[13px] focus:outline-none focus:border-brand-yellow focus:ring-1 focus:ring-brand-yellow transition-all resize-none"></textarea>
                </div>

                <!-- Select File (Triggers Modal) -->
                <div>
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Select File <span class="text-red-500">*</span></label>
                    <div onclick="openFileModal()" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg text-[13px] text-gray-500 cursor-pointer hover:bg-gray-50 hover:border-brand-yellow transition-all flex items-center justify-between group" id="file-selector-btn">
                        <span id="selected-file-name" class="truncate pr-2">Select file...</span>
                        <i class="fi fi-rr-folder-open text-gray-400 group-hover:text-brand-yellow transition-colors shrink-0"></i>
                    </div>
                    <p class="text-[11px] text-gray-400 mt-1.5">Select a file from content files</p>
                    <input type="hidden" id="dl-file-url" required>
                    <input type="hidden" id="dl-file-name">
                </div>

            </form>
        </div>

        <!-- Sidebar Footer -->
        <div class="p-6 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
            <button type="button" onclick="closeSidebar()" class="px-6 py-2.5 rounded-lg text-[13px] font-semibold text-gray-700 border border-gray-200 hover:bg-gray-50 transition-all">
                Cancel
            </button>
            <button type="submit" form="create-form" class="px-6 py-2.5 bg-brand-yellow rounded-lg text-[13px] font-bold text-gray-900 shadow-sm hover:bg-brand-yellowHover transition-all">
                Create Download
            </button>
        </div>
    </div>


    <!-- ============================================== -->
    <!-- CONTENT FILE PICKER MODAL (Full Files View)    -->
    <!-- ============================================== -->
    <div id="file-modal-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[120] opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center p-4 sm:p-6" onclick="closeFileModal()">
        
        <div id="file-modal-content" class="bg-white rounded-[16px] shadow-2xl w-full max-w-5xl h-full max-h-[85vh] flex flex-col overflow-hidden relative transform scale-95 opacity-0 transition-all duration-300" onclick="event.stopPropagation()">
            
            <!-- Modal Header -->
            <div class="flex justify-between items-start px-8 pt-8 pb-4">
                <div>
                    <h2 class="text-[20px] font-bold text-gray-900 leading-tight">Files</h2>
                    <p class="text-[13px] text-gray-500 mt-1">Manage your files</p>
                </div>
                <button type="button" onclick="closeFileModal()" class="text-gray-400 hover:text-gray-700 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
                    <i class="fi fi-rr-cross text-[14px]"></i>
                </button>
            </div>

            <!-- Stats & Toolbar Box -->
            <div class="px-8 pb-4 border-b border-gray-100">
                <div class="border border-gray-200 rounded-xl p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    
                    <!-- Stats Area -->
                    <div class="flex items-center gap-5">
                        <div class="flex items-center gap-2">
                            <div class="relative w-8 h-8 flex items-center justify-center">
                                <svg class="absolute inset-0 w-full h-full transform -rotate-90">
                                    <circle cx="16" cy="16" r="14" fill="none" stroke-width="2" stroke="currentColor" class="text-blue-50"></circle>
                                    <circle id="modal-storage-fill" cx="16" cy="16" r="14" fill="none" stroke-width="2" stroke="currentColor" stroke-linecap="round" class="text-brand-blue transition-all duration-500 ease-out" style="stroke-dasharray: 87.96; stroke-dashoffset: 87.96;"></circle>
                                </svg>
                                <span id="modal-percent-text" class="relative text-[8px] font-bold text-brand-blue">0%</span>
                            </div>
                        </div>

                        <div id="modal-storage-text" class="flex items-center gap-1.5 text-[13px] text-gray-600 font-medium border-r border-gray-200 pr-5">
                            <i class="fi fi-rr-database text-gray-400"></i> 0.00 KB
                        </div>
                        
                        <div id="modal-files-count" class="flex items-center gap-1.5 text-[13px] text-gray-600 font-medium">
                            <i class="fi fi-rr-document text-gray-400"></i> 0 files
                        </div>
                    </div>

                    <!-- View Toggle -->
                    <div class="flex bg-gray-50 border border-gray-200 p-1 rounded-lg items-center gap-1">
                        <button type="button" id="modal-btn-grid" onclick="switchModalView('grid')" class="bg-brand-yellow text-gray-900 shadow-sm text-[13px] font-bold py-1.5 px-4 rounded-md flex items-center gap-2 transition-all">
                            <i class="fi fi-rr-grid"></i> Grid
                        </button>
                        <button type="button" id="modal-btn-list" onclick="switchModalView('list')" class="text-gray-500 hover:text-gray-800 text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center gap-2 transition-all bg-transparent">
                            <i class="fi fi-rr-list"></i> List
                        </button>
                    </div>

                </div>
            </div>

            <!-- Modal Content Area -->
            <div class="flex-1 overflow-y-auto p-8 bg-white custom-scrollbar">
                <div id="modal-file-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5">
                    <!-- JS Injected Mock Files -->
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="px-8 py-5 border-t border-gray-100 flex justify-between items-center bg-white">
                <span class="text-[13px] text-gray-500 font-medium" id="modal-result-stats">Showing 0 to 0 of 0 results</span>
                <div class="flex gap-3">
                    <button type="button" onclick="closeFileModal()" class="px-6 py-2.5 rounded-lg text-[13px] font-semibold text-gray-700 border border-gray-200 hover:bg-gray-50 transition-all">Cancel</button>
                    <button type="button" id="modal-select-btn" onclick="confirmFileSelection()" disabled class="px-6 py-2.5 rounded-lg text-[13px] font-bold text-gray-900 bg-brand-yellow/50 cursor-not-allowed transition-all">Select</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let downloadsData = [];
        let availableFiles = [];
        let tempSelectedFile = null; 
        let modalViewMode = 'grid'; // Default modal view mode

        // Capacity constraint for radial bar
        const MAX_STORAGE_BYTES = 2 * 1024 * 1024 * 1024; // 2 GB

        function initModule() {
            let retries = 0;
            const dbCheckInterval = setInterval(() => {
                if (window.db) {
                    clearInterval(dbCheckInterval);
                    setupRealtimeListeners();
                } else if (retries > 50) { 
                    clearInterval(dbCheckInterval);
                    console.warn("Firestore not detected after 5s. Running locally with mock data.");
                    loadMockData();
                }
                retries++;
            }, 100);
        }

        function setupRealtimeListeners() {
            // Listen to Downloads collection
            if (window.downloadsUnsub) window.downloadsUnsub();
            window.downloadsUnsub = window.db.collection('downloads').orderBy('createdAt', 'desc').onSnapshot(snap => {
                downloadsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderDownloads();
            }, error => console.error("Error fetching downloads: ", error));

            // Listen to contentFiles collection (uploaded in the Files module)
            if (window.filesUnsub) window.filesUnsub();
            window.filesUnsub = window.db.collection('contentFiles').orderBy('createdAt', 'desc').onSnapshot(snap => {
                availableFiles = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // If the modal is open, re-render it so it shows the newly fetched files
                if(document.getElementById('file-modal-overlay').classList.contains('opacity-100')) {
                    renderModalFiles();
                }
            }, error => console.error("Error fetching files: ", error));
        }

        function loadMockData() {
            availableFiles = [
                { id: 'f1', name: 'Eid_Ariyoor.jpg', size: 591560, type: 'image/jpeg', url: 'https://images.unsplash.com/photo-1542816417-0983c9c9ad53?auto=format&fit=crop&w=300&q=80' },
                { id: 'f2', name: 'Vidhyarambam.jpg', size: 502770, type: 'image/jpeg', url: 'https://images.unsplash.com/photo-1588661706689-5452243ec4a3?auto=format&fit=crop&w=300&q=80' },
                { id: 'f3', name: 'Campaign_Schedule_2026.pdf', size: 2400000, type: 'application/pdf', url: '' },
                { id: 'f4', name: 'Promo_Video_V1.mp4', size: 8500000, type: 'video/mp4', url: '' }
            ];
            
            downloadsData = [
                {
                    id: 'mock-dl-1',
                    title: 'Election Manifesto 2026',
                    category: 'concept_note',
                    description: 'The primary concept note for the upcoming 2026 regional election campaigns.',
                    file: { name: 'Concept_Note_Final.pdf', url: '#' },
                    createdAt: { toDate: () => new Date() }
                }
            ];
            
            renderDownloads();
        }

        // Helpers
        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0.00 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        function getFileIcon(type) {
            type = type || '';
            if (type.includes('image')) return 'fi-rr-picture text-brand-blue';
            if (type.includes('pdf')) return 'fi-rr-document text-red-500';
            if (type.includes('video')) return 'fi-rr-video text-purple-500';
            if (type.includes('audio')) return 'fi-rr-music text-yellow-500';
            if (type.includes('zip') || type.includes('rar')) return 'fi-rr-folder-zip text-orange-500';
            return 'fi-rr-file text-gray-500';
        }

        // ==========================================
        // View Toggle Logic (Main Dashboard)
        // ==========================================
        function switchView(viewName) {
            const btnList = document.getElementById('btn-list');
            const btnGrid = document.getElementById('btn-grid');
            const viewList = document.getElementById('view-list');
            const viewGrid = document.getElementById('view-grid');

            const activeClass = "bg-brand-yellow text-gray-900 text-[13px] font-bold py-1.5 px-4 rounded-full flex items-center gap-2 transition-all shadow-sm";
            const inactiveClass = "text-gray-500 hover:text-gray-800 text-[13px] font-medium py-1.5 px-4 rounded-full flex items-center gap-2 transition-all bg-transparent";

            if (viewName === 'list') {
                viewList.classList.remove('hidden');
                viewGrid.classList.add('hidden');
                btnList.className = activeClass;
                btnGrid.className = inactiveClass;
            } else {
                viewList.classList.add('hidden');
                viewGrid.classList.remove('hidden');
                btnGrid.className = activeClass;
                btnList.className = inactiveClass;
            }
        }

        // ==========================================
        // Sidebar Logic
        // ==========================================
        function openSidebar() {
            const overlay = document.getElementById('sidebar-overlay');
            const sidebar = document.getElementById('create-sidebar');
            
            overlay.classList.remove('hidden'); 
            
            // Allow layout cycle before starting opacity transition
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
                
                sidebar.classList.remove('translate-x-full');
                sidebar.classList.add('translate-x-0');
            }, 10);
        }

        function closeSidebar() {
            const overlay = document.getElementById('sidebar-overlay');
            const sidebar = document.getElementById('create-sidebar');
            
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0');
            
            sidebar.classList.remove('translate-x-0');
            sidebar.classList.add('translate-x-full');
            
            // Hide overlay completely and reset form AFTER slide animation ends (300ms)
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.getElementById('create-form').reset();
                const fileNameLabel = document.getElementById('selected-file-name');
                fileNameLabel.innerText = 'Select file...';
                fileNameLabel.classList.remove('text-gray-900', 'font-medium');
                document.getElementById('dl-file-url').value = '';
                document.getElementById('dl-file-name').value = '';
            }, 300);
        }

        // ==========================================
        // Expanded File Picker Modal Logic
        // ==========================================
        function openFileModal() {
            const overlay = document.getElementById('file-modal-overlay');
            const content = document.getElementById('file-modal-content');
            
            overlay.classList.remove('hidden');
            tempSelectedFile = null;
            
            // Calculate Modal Stats and render files before popping up
            updateModalStats();
            renderModalFiles();

            setTimeout(() => {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                overlay.classList.add('opacity-100', 'pointer-events-auto');
                
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeFileModal() {
            const overlay = document.getElementById('file-modal-overlay');
            const content = document.getElementById('file-modal-content');
            
            overlay.classList.remove('opacity-100', 'pointer-events-auto');
            overlay.classList.add('opacity-0', 'pointer-events-none');

            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                tempSelectedFile = null; 
            }, 300);
        }

        function switchModalView(mode) {
            modalViewMode = mode;
            const btnGrid = document.getElementById('modal-btn-grid');
            const btnList = document.getElementById('modal-btn-list');
            
            const activeClass = "bg-brand-yellow text-gray-900 shadow-sm text-[13px] font-bold py-1.5 px-4 rounded-md flex items-center gap-2 transition-all";
            const inactiveClass = "text-gray-500 hover:text-gray-800 text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center gap-2 transition-all bg-transparent";

            if (mode === 'grid') {
                btnGrid.className = activeClass;
                btnList.className = inactiveClass;
            } else {
                btnList.className = activeClass;
                btnGrid.className = inactiveClass;
            }
            renderModalFiles();
        }

        function updateModalStats() {
            const totalStorage = availableFiles.reduce((acc, f) => acc + (f.size || 0), 0);
            let percent = Math.max(0, Math.min(100, (totalStorage / MAX_STORAGE_BYTES) * 100));
            let displayPercent = percent > 0 && percent < 1 ? percent.toFixed(1) : Math.round(percent);
            
            const radius = 14;
            const circumference = 2 * Math.PI * radius; 
            const offset = circumference - (percent / 100) * circumference;

            document.getElementById('modal-storage-fill').style.strokeDasharray = circumference;
            document.getElementById('modal-storage-fill').style.strokeDashoffset = offset;
            document.getElementById('modal-percent-text').innerText = `${displayPercent}%`;
            
            document.getElementById('modal-storage-text').innerHTML = `<i class="fi fi-rr-database text-gray-400"></i> ${formatBytes(totalStorage)}`;
            document.getElementById('modal-files-count').innerHTML = `<i class="fi fi-rr-document text-gray-400"></i> ${availableFiles.length} files`;
            document.getElementById('modal-result-stats').innerText = `Showing ${availableFiles.length > 0 ? '1' : '0'} to ${availableFiles.length} of ${availableFiles.length} results`;
        }

        function renderModalFiles() {
            const container = document.getElementById('modal-file-grid');
            
            // Adjust container classes based on view mode
            if (modalViewMode === 'grid') {
                container.className = "grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5";
            } else {
                container.className = "flex flex-col gap-3";
            }

            // Empty state
            if (availableFiles.length === 0) {
                container.className = "flex flex-col h-full";
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center py-10">
                        <i class="fi fi-rr-folder-open text-[48px] text-gray-200 mb-4"></i>
                        <p class="text-[14px] text-gray-500 font-medium">No files available. Please upload files in the Files section.</p>
                    </div>`;
                updateSelectButtonState();
                return;
            }

            container.innerHTML = availableFiles.map(file => {
                const isSelected = tempSelectedFile && tempSelectedFile.id === file.id;
                const fileType = file.type || '';
                const fileIcon = getFileIcon(fileType);
                
                let thumbHTML = '';
                if(fileType.includes('image') && file.url) {
                    thumbHTML = `<img src="${file.url}" class="w-full h-full object-cover" alt="thumbnail">`;
                } else {
                    thumbHTML = `<div class="w-full h-full bg-gray-50 flex items-center justify-center"><i class="fi ${fileIcon} text-[40px] opacity-50"></i></div>`;
                }

                if (modalViewMode === 'grid') {
                    // Grid Layout Item
                    return `
                    <div onclick="selectModalFile('${file.id}')" class="relative bg-white border ${isSelected ? 'border-brand-blue ring-1 ring-brand-blue shadow-sm' : 'border-gray-200 hover:shadow-md'} rounded-xl overflow-hidden cursor-pointer transition-all flex flex-col group h-48">
                        <div class="absolute top-2.5 left-2.5 w-5 h-5 rounded flex items-center justify-center z-10 transition-colors ${isSelected ? 'bg-brand-blue border-brand-blue' : 'bg-white border border-gray-300 opacity-0 group-hover:opacity-100'}">
                            <i class="fi fi-rr-check text-[10px] text-white ${isSelected ? 'block' : 'hidden'}"></i>
                        </div>
                        <div class="h-28 w-full border-b border-gray-100 relative bg-gray-50">
                            <div class="absolute inset-x-0 top-0 h-10 bg-gradient-to-b from-black/20 to-transparent pointer-events-none"></div>
                            ${thumbHTML}
                        </div>
                        <div class="flex flex-col flex-1 p-3 bg-white">
                            <div class="flex items-start gap-2">
                                <i class="fi ${fileIcon} text-[14px] mt-0.5 shrink-0"></i>
                                <div class="flex flex-col overflow-hidden">
                                    <span class="text-[13px] font-bold text-gray-800 truncate" title="${file.name}">${file.name}</span>
                                    <span class="text-[11px] text-gray-500 mt-0.5">${formatBytes(file.size)}</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                } else {
                    // List Layout Item
                    return `
                    <div onclick="selectModalFile('${file.id}')" class="flex items-center gap-4 p-3 rounded-xl border ${isSelected ? 'border-brand-blue ring-1 ring-brand-blue bg-blue-50/20' : 'border-gray-200 hover:bg-gray-50'} cursor-pointer transition-all">
                        <div class="w-5 h-5 rounded flex items-center justify-center shrink-0 border transition-colors ${isSelected ? 'bg-brand-blue border-brand-blue' : 'bg-white border-gray-300'}">
                            <i class="fi fi-rr-check text-[10px] text-white ${isSelected ? 'block' : 'hidden'}"></i>
                        </div>
                        <div class="w-12 h-12 rounded bg-gray-100 flex items-center justify-center shrink-0 overflow-hidden border border-gray-100">
                            ${fileType.includes('image') && file.url ? `<img src="${file.url}" class="w-full h-full object-cover">` : `<i class="fi ${fileIcon} text-[20px] text-gray-400"></i>`}
                        </div>
                        <div class="flex flex-col flex-1 min-w-0">
                            <span class="text-[14px] font-bold text-gray-800 truncate" title="${file.name}">${file.name}</span>
                            <span class="text-[12px] text-gray-500 mt-0.5">${formatBytes(file.size)}</span>
                        </div>
                    </div>`;
                }
            }).join('');

            updateSelectButtonState();
        }

        function updateSelectButtonState() {
            const selectBtn = document.getElementById('modal-select-btn');
            if (tempSelectedFile) {
                selectBtn.disabled = false;
                selectBtn.classList.remove('bg-brand-yellow/50', 'cursor-not-allowed');
                selectBtn.classList.add('bg-brand-yellow', 'hover:bg-brand-yellowHover', 'shadow-sm');
            } else {
                selectBtn.disabled = true;
                selectBtn.classList.add('bg-brand-yellow/50', 'cursor-not-allowed');
                selectBtn.classList.remove('bg-brand-yellow', 'hover:bg-brand-yellowHover', 'shadow-sm');
            }
        }

        function selectModalFile(id) {
            tempSelectedFile = availableFiles.find(f => f.id === id);
            renderModalFiles(); 
        }

        function confirmFileSelection() {
            if (!tempSelectedFile) return;
            
            // Update sidebar input UI
            const label = document.getElementById('selected-file-name');
            label.innerText = tempSelectedFile.name;
            label.classList.add('text-gray-900', 'font-medium');
            label.classList.remove('text-gray-500');
            
            // Set hidden values
            document.getElementById('dl-file-name').value = tempSelectedFile.name;
            document.getElementById('dl-file-url').value = tempSelectedFile.url || `https://mock-url.com/${tempSelectedFile.name}`;
            
            closeFileModal();
        }

        // ==========================================
        // Form Submission & Rendering
        // ==========================================
        async function handleCreateDownload(e) {
            e.preventDefault();
            
            // Search the whole document for the button, since it is outside the form element
            const btn = document.querySelector('button[form="create-form"]');
            let originalText = "Create Download";
            
            if (btn) {
                originalText = btn.innerText;
                btn.innerText = "Creating...";
                btn.disabled = true;
            }

            const title = document.getElementById('dl-title').value;
            const category = document.getElementById('dl-category').value;
            const desc = document.getElementById('dl-description').value;
            const fileName = document.getElementById('dl-file-name').value;
            const fileUrl = document.getElementById('dl-file-url').value;

            if(!fileName) {
                alert("Please select a file.");
                if (btn) {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
                return;
            }

            const newDownload = {
                title: title,
                category: category || 'Uncategorized',
                description: desc,
                file: { name: fileName, url: fileUrl },
                createdAt: (typeof firebase !== 'undefined') ? firebase.firestore.FieldValue.serverTimestamp() : new Date()
            };

            try {
                if (window.db) {
                    await window.db.collection('downloads').add(newDownload);
                    if(typeof showToast === 'function') showToast("✅ Download created");
                } else {
                    downloadsData.unshift({ id: Date.now().toString(), ...newDownload, createdAt: { toDate: () => new Date() } });
                    renderDownloads();
                }
                closeSidebar();
            } catch (error) {
                console.error("Error saving download:", error);
                alert("Failed to save. Check console for details.");
            } finally {
                if (btn) {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            }
        }

        function getCategoryColor(cat) {
            switch(cat.toLowerCase()) {
                case 'candidates': return 'bg-blue-50 text-blue-600 border-blue-100';
                case 'programs': return 'bg-green-50 text-green-600 border-green-100';
                case 'schedule': return 'bg-purple-50 text-purple-600 border-purple-100';
                case 'concept_note': return 'bg-orange-50 text-orange-600 border-orange-100';
                default: return 'bg-gray-50 text-gray-600 border-gray-200';
            }
        }

        function renderDownloads() {
            const tableBody = document.getElementById('table-body');
            const gridBody = document.getElementById('grid-body');
            
            // Update counts
            document.getElementById('total-results').innerText = downloadsData.length;
            document.getElementById('page-start').innerText = downloadsData.length > 0 ? '1' : '0';
            document.getElementById('page-end').innerText = downloadsData.length;
            document.getElementById('page-indicator').innerText = `Page 1 of 1`;

            if (downloadsData.length === 0) {
                const emptyHTML = `
                    <div class="flex flex-col justify-center items-center py-24 text-center">
                        <i class="fi fi-rr-box-open text-[48px] text-gray-200 mb-4"></i>
                        <p class="text-[13px] text-gray-500 font-medium">No downloads found</p>
                    </div>`;
                tableBody.innerHTML = emptyHTML;
                gridBody.innerHTML = `<div class="col-span-full">${emptyHTML}</div>`;
                return;
            }

            let tableHTML = '';
            let gridHTML = '';

            downloadsData.forEach(item => {
                const catDisplay = item.category.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
                const catColor = getCategoryColor(item.category);

                // Table Row
                tableHTML += `
                <div class="grid grid-cols-12 gap-4 items-center py-4 px-6 border-b border-gray-100 bg-white hover:bg-gray-50 transition-colors group">
                    <div class="col-span-1 flex justify-center">
                        <div class="w-4 h-4 rounded-full border border-gray-300"></div>
                    </div>
                    
                    <div class="col-span-4 flex flex-col pr-4">
                        <span class="text-[14px] font-bold text-gray-900 truncate">${item.title}</span>
                        <span class="text-[12px] text-gray-500 truncate mt-0.5">${item.description || 'No description provided'}</span>
                    </div>
                    
                    <div class="col-span-2 flex justify-center">
                        <span class="px-2.5 py-1 text-[11px] font-semibold rounded-md border ${catColor} whitespace-nowrap">
                            ${catDisplay}
                        </span>
                    </div>
                    
                    <div class="col-span-3 flex items-center justify-center gap-2 text-[12px] text-gray-600 bg-gray-50 rounded-lg py-1.5 px-3 border border-gray-100 truncate mx-2">
                        <i class="fi fi-rr-document text-gray-400"></i>
                        <span class="truncate max-w-[120px]" title="${item.file.name}">${item.file.name}</span>
                    </div>
                    
                    <div class="col-span-2 flex justify-end items-center gap-3 pr-4">
                        <a href="${item.file.url || '#'}" target="_blank" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-brand-blue hover:bg-blue-50 transition-colors" title="Download">
                            <i class="fi fi-rr-download text-[14px]"></i>
                        </a>
                        <button onclick="deleteDownload('${item.id}')" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors" title="Delete">
                            <i class="fi fi-rr-trash text-[14px]"></i>
                        </button>
                    </div>
                </div>`;

                // Grid Card
                gridHTML += `
                <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-all flex flex-col relative group">
                    <div class="flex justify-between items-start mb-3">
                        <span class="px-2 py-1 text-[10px] font-bold rounded border uppercase tracking-wide ${catColor}">
                            ${catDisplay}
                        </span>
                        <button onclick="deleteDownload('${item.id}')" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fi fi-rr-trash text-[14px]"></i>
                        </button>
                    </div>
                    <h3 class="text-[15px] font-bold text-gray-900 mb-1 line-clamp-1" title="${item.title}">${item.title}</h3>
                    <p class="text-[12px] text-gray-500 line-clamp-2 mb-4 flex-1">${item.description || 'No description provided'}</p>
                    
                    <div class="pt-4 border-t border-gray-100 mt-auto flex items-center justify-between">
                        <div class="flex items-center gap-2 overflow-hidden flex-1 pr-2">
                            <i class="fi fi-rr-document text-gray-400 text-[14px] shrink-0"></i>
                            <span class="text-[11px] text-gray-500 truncate" title="${item.file.name}">${item.file.name}</span>
                        </div>
                        <a href="${item.file.url || '#'}" target="_blank" class="shrink-0 w-8 h-8 bg-gray-50 rounded-full flex items-center justify-center text-gray-600 hover:bg-brand-yellow hover:text-gray-900 transition-colors">
                            <i class="fi fi-rr-download text-[12px]"></i>
                        </a>
                    </div>
                </div>`;
            });

            tableBody.innerHTML = tableHTML;
            gridBody.innerHTML = gridHTML;
        }

        async function deleteDownload(id) {
            if(confirm("Are you sure you want to delete this download entry?")) {
                if (window.db) {
                    try {
                        await window.db.collection('downloads').doc(id).delete();
                        if(typeof showToast === 'function') showToast("✅ Deleted successfully");
                    } catch (error) {
                        console.error("Error deleting:", error);
                    }
                } else {
                    downloadsData = downloadsData.filter(d => d.id !== id);
                    renderDownloads();
                }
            }
        }

        // Initialize Realtime Sync
        initModule();

    </script>
</body>
</html>
