<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster Preview - Festival Management</title>
    <link rel="icon" href="favicon.ico" sizes="any">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif']
                    },
                    colors: {
                        brand: {
                            blue: '#134E8E',
                            bg: '#f8f9fc'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .poster-preview {
            height: 85vh;
            aspect-ratio: 9/16;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            background-color: #ffffff;
            border-radius: 32px;
        }

        .element-view {
            position: absolute;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .poster-preview { height: 70vh; }
        }
    </style>
</head>

<body class="bg-brand-bg text-slate-900 font-sans h-screen flex flex-col items-center justify-center p-4 sm:p-8">

    <!-- Header -->
    <div class="fixed top-0 left-0 right-0 h-16 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-brand-blue rounded-lg flex items-center justify-center text-white shadow-lg">
                <i class="fi fi-rr-picture text-base"></i>
            </div>
            <div>
                <h1 class="text-sm font-black text-slate-900 uppercase tracking-tight">Master Poster Preview</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Live Template View</p>
            </div>
        </div>
        <button onclick="window.location.reload()" class="w-10 h-10 rounded-xl hover:bg-slate-100 flex items-center justify-center text-slate-400 transition-all">
            <i class="fi fi-rr-refresh text-lg"></i>
        </button>
    </div>

    <!-- Preview Canvas -->
    <div id="poster-canvas" class="poster-preview opacity-0 transition-opacity duration-500 mt-8">
        <!-- Elements will be injected here -->
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCKA0k_9UgoJX_RBgEsIeNdiW2w0Okko1o",
            authDomain: "festie-s1u2h3.firebaseapp.com",
            projectId: "festie-s1u2h3",
            storageBucket: "festie-s1u2h3.firebasestorage.app",
            messagingSenderId: "794049194885",
            appId: "1:794049194885:web:8f75f0df4c15cde15eb2ec"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function loadPreview() {
            db.collection('settings').doc('posterConfig').onSnapshot(doc => {
                if (doc.exists) {
                    const config = doc.data();
                    renderCanvas(config);
                } else {
                    document.getElementById('poster-canvas').innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-slate-400 p-12 text-center">
                            <i class="fi fi-rr-settings-sliders text-4xl mb-4"></i>
                            <p class="font-bold">No Configuration Found</p>
                            <p class="text-xs mt-2">Go to Poster Setup to create your first template.</p>
                        </div>
                    `;
                    document.getElementById('poster-canvas').classList.remove('opacity-0');
                }
            });
        }

        function renderCanvas(config) {
            const canvas = document.getElementById('poster-canvas');
            canvas.innerHTML = '';
            
            if (config.bgImage) {
                canvas.style.backgroundImage = `url(${config.bgImage})`;
            }

            Object.keys(config.elements).forEach(key => {
                const el = config.elements[key];
                if (!el.visible) return;

                const div = document.createElement('div');
                div.className = 'element-view';
                div.style.left = el.left;
                div.style.top = el.top;
                div.style.transform = 'translateX(-50%)';

                if (el.type === 'image') {
                    const img = document.createElement('img');
                    const placeholder = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300"><rect width="300" height="300" fill="%23f1f5f9"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="20" fill="%2394a3b8">${key.toUpperCase()}</text></svg>`;
                    
                    let src = placeholder;
                    if (key === 'logo') src = config.logoImage || placeholder;

                    img.src = src;
                    img.style.width = el.width || '150px';
                    img.style.height = el.width || '150px';
                    img.style.objectFit = 'cover';
                    
                    if (el.shape === 'circle') img.style.borderRadius = '50%';
                    else if (el.shape === 'rounded') img.style.borderRadius = '20px';

                    div.appendChild(img);
                } else {
                    div.innerText = el.text || key;
                    div.style.fontSize = el.fontSize;
                    div.style.color = el.color;
                    div.style.fontWeight = el.fontWeight;
                    div.style.fontStyle = el.fontStyle;
                    div.style.textAlign = el.textAlign;
                    div.style.fontFamily = "'Outfit', sans-serif";
                }

                canvas.appendChild(div);
            });

            canvas.classList.remove('opacity-0');
        }

        window.onload = loadPreview;
    </script>
</body>
</html>
