<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Topic Registration</title>
    <!-- Favicon / PWA Setup -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="logo-512.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="logo-192.png">
</head>
<body>
    <div class="mb-6 shrink-0 pt-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h1 id="tmt-title" class="text-xl sm:text-[22px] font-semibold text-gray-900 leading-tight">Topic Registration</h1>
            <p class="text-[13px] text-gray-500 mt-1">Submit topics for programs that strictly require it.</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 pb-6" id="tmt-list">
        <div class="col-span-full py-16 text-center text-[13px] text-gray-400">
            <div class="w-6 h-6 border-2 border-gray-200 border-t-brand-blue rounded-full animate-spin mx-auto mb-3"></div>
            Fetching topics...
        </div>
    </div>

    <script>
        document.getElementById('tmt-title').innerText = (window.currentTMSection || 'Section') + ' Topic Registration';
        var section = window.currentTMSection;
        var team = localStorage.getItem('managerTeam');
        
        window.tmtProgramsList = [];
        window.tmtRegistrationsList = [];
        window.tmtCandidates = [];
        window.tmtActiveTabs = {};

        if (typeof db !== 'undefined' && section && team) {
            db.collection('candidates').where('team', '==', team).where('section', '==', section).get().then(snap => {
                window.tmtCandidates = snap.docs.map(d => ({id: d.id, ...d.data()}));
                return db.collection('programs').where('section', '==', section).where('status', '==', true).where('topicRegistration', '==', true).get();
            }).then(snap => {
                window.tmtProgramsList = snap.docs.map(d => ({id: d.id, ...d.data()}));
                
                if(window.tmtProgUnsub) window.tmtProgUnsub();
                window.tmtProgUnsub = db.collection('registrations').where('team', '==', team).where('section', '==', section).onSnapshot(regSnap => {
                    window.tmtRegistrationsList = regSnap.docs.map(d => ({id: d.id, ...d.data()}));
                    window.renderTMTopics();
                });
            });
        }

        window.switchTMTTab = function(regId, chestNo) {
            window.tmtActiveTabs[regId] = chestNo;
            
            // Hide all tab contents for this reg
            document.querySelectorAll(`.tmt-inputs-${regId}`).forEach(el => el.classList.add('hidden'));
            // Show selected
            const target = document.getElementById(`tmt-inputs-${regId}-${chestNo}`);
            if (target) target.classList.remove('hidden');
            
            // Update button styles
            document.querySelectorAll(`.tmt-tab-btn-${regId}`).forEach(btn => {
                btn.classList.remove('text-brand-blue', 'border-brand-blue');
                btn.classList.add('text-gray-400', 'border-transparent');
            });
            const activeBtn = document.getElementById(`tmt-tab-btn-${regId}-${chestNo}`);
            if (activeBtn) {
                activeBtn.classList.add('text-brand-blue', 'border-brand-blue');
                activeBtn.classList.remove('text-gray-400', 'border-transparent');
            }
        };

        window.renderTMTopics = function() {
            const container = document.getElementById('tmt-list');
            const filteredRegs = window.tmtRegistrationsList.filter(r => window.tmtProgramsList.some(p => p.id === r.programId));

            if (filteredRegs.length === 0) {
                container.innerHTML = '<div class="col-span-full py-16 text-center text-[13px] text-gray-500 font-medium bg-white rounded-2xl shadow-sm border border-gray-100">You have no registered programs that require topics.</div>';
                return;
            }

            container.innerHTML = filteredRegs.map(reg => {
                const prog = window.tmtProgramsList.find(p => p.id === reg.programId) || { code: 'Unknown', name: 'Unknown Program', type: 'Individual' };
                const chests = reg.chestNumbers || [];
                const isGroup = (prog.type || '').toLowerCase().includes('group');
                
                // Initialize active tab if not set
                const defaultTab = isGroup ? 'group' : (chests[0] || '');
                if (!window.tmtActiveTabs[reg.id]) window.tmtActiveTabs[reg.id] = defaultTab;
                const activeChest = window.tmtActiveTabs[reg.id];

                let tabsHTML = '';
                if (!isGroup && chests.length > 0) {
                    tabsHTML = `
                        <div class="flex overflow-x-auto no-scrollbar border-b border-gray-100 mb-4 gap-4 scroll-smooth">
                            ${chests.map(c => {
                                const cand = window.tmtCandidates.find(can => can.chestNo === c);
                                const active = activeChest === c;
                                const activeClass = active ? 'text-brand-blue border-brand-blue' : 'text-gray-400 border-transparent';
                                return `
                                    <button onclick="window.switchTMTTab('${reg.id}', '${c}')" id="tmt-tab-btn-${reg.id}-${c}" 
                                        class="tmt-tab-btn-${reg.id} pb-2 text-[10px] font-bold uppercase tracking-wider ${activeClass} border-b-2 transition-all whitespace-nowrap outline-none">
                                        #${c} ${cand ? cand.name.split(' ')[0] : ''}
                                    </button>`;
                            }).join('')}
                        </div>
                    `;
                }

                let contentsHTML = '';
                if (isGroup) {
                    contentsHTML = `
                        <div id="tmt-inputs-${reg.id}-group" class="space-y-3">
                            ${renderTopicInputs(reg.id, 'group', reg.topicName, reg.topicAuthor, reg.topicContent)}
                        </div>`;
                } else {
                    chests.forEach(c => {
                        const topicData = (reg.topics && reg.topics[c]) || {};
                        // Fallback for first candidate if topics map is missing or for legacy data
                        const name = topicData.name || (c === chests[0] ? reg.topicName : '');
                        const author = topicData.author || (c === chests[0] ? reg.topicAuthor : '');
                        const content = topicData.content || (c === chests[0] ? reg.topicContent : '');
                        
                        const isHidden = activeChest === c ? '' : 'hidden';
                        contentsHTML += `
                            <div id="tmt-inputs-${reg.id}-${c}" class="tmt-inputs-${reg.id} ${isHidden} space-y-3">
                                ${renderTopicInputs(reg.id, c, name, author, content)}
                            </div>`;
                    });
                    // Fallback if no chests
                    if (chests.length === 0) {
                        contentsHTML = `<div class="text-center py-4 text-gray-400 text-[12px]">No candidates registered.</div>`;
                    }
                }

                return `
                <div class="bg-white rounded-2xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.02)] p-5 flex flex-col hover:shadow-md transition-shadow">
                    <div class="mb-4">
                        <span class="text-[10px] font-bold text-brand-blue bg-blue-50 border border-blue-100 px-2 py-0.5 rounded-full mb-2 inline-block shadow-sm">${prog.code} &bull; ${prog.type}</span>
                        <h3 class="text-[15px] font-bold text-gray-900 leading-tight pr-4">${prog.name}</h3>
                        <p class="text-[11px] text-gray-500 mt-1 font-medium">${isGroup ? 'Group Registration' : chests.length + ' Registered Candidates'}</p>
                    </div>
                    ${tabsHTML}
                    <div class="mt-auto">
                        ${contentsHTML}
                        <button id="tmt-btn-${reg.id}" onclick="window.saveTMTopic('${reg.id}')" class="w-full mt-4 bg-gray-50 hover:bg-[#FFB33F] text-gray-800 border border-gray-200 hover:border-transparent font-bold text-[12px] py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
                            <i class="fi fi-rr-disk text-xs"></i> Save Topic Details
                        </button>
                    </div>
                </div>`;
            }).join('');
        };

        function renderTopicInputs(regId, chestNo, name, author, content) {
            return `
                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Topic Name</label>
                    <input type="text" id="tmt-name-${regId}-${chestNo}" value="${name || ''}" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-[13px] focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition-all shadow-sm" placeholder="Enter topic title">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Author</label>
                    <input type="text" id="tmt-author-${regId}-${chestNo}" value="${author || ''}" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-[13px] focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition-all shadow-sm" placeholder="Enter author name">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Topic Description</label>
                    <textarea id="tmt-content-${regId}-${chestNo}" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-[13px] focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition-all shadow-sm" placeholder="Enter details...">${content || ''}</textarea>
                </div>
            `;
        }

        window.saveTMTopic = function(regId) {
            const reg = window.tmtRegistrationsList.find(r => r.id === regId);
            if (!reg) return;
            const prog = window.tmtProgramsList.find(p => p.id === reg.programId) || { type: 'Individual' };
            const isGroup = (prog.type || '').toLowerCase().includes('group');
            const chests = reg.chestNumbers || [];
            
            let updateData = {
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (isGroup) {
                const name = document.getElementById(`tmt-name-${regId}-group`).value.trim();
                const author = document.getElementById(`tmt-author-${regId}-group`).value.trim();
                const content = document.getElementById(`tmt-content-${regId}-group`).value.trim();
                
                if(!name) return typeof showToast === 'function' && showToast("❌ Topic Name cannot be empty.");
                
                updateData.topicName = name;
                updateData.topicAuthor = author;
                updateData.topicContent = content;
            } else {
                let topics = reg.topics || {};
                let firstName = '', firstAuthor = '', firstContent = '';
                
                chests.forEach((c, idx) => {
                    const name = document.getElementById(`tmt-name-${regId}-${c}`).value.trim();
                    const author = document.getElementById(`tmt-author-${regId}-${c}`).value.trim();
                    const content = document.getElementById(`tmt-content-${regId}-${c}`).value.trim();
                    
                    topics[c] = { name, author, content };
                    
                    if (idx === 0) {
                        firstName = name;
                        firstAuthor = author;
                        firstContent = content;
                    }
                });
                
                updateData.topics = topics;
                // Backwards compatibility for root fields (use first candidate)
                updateData.topicName = firstName;
                updateData.topicAuthor = firstAuthor;
                updateData.topicContent = firstContent;
            }
            
            const btn = document.getElementById('tmt-btn-' + regId);
            btn.innerHTML = '<div class="w-3 h-3 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></div>'; btn.disabled = true;
            
            db.collection('registrations').doc(regId).update(updateData).then(() => { 
                typeof showToast === 'function' && showToast("✅ Topic Saved Successfully!"); 
                btn.innerHTML = '<i class="fi fi-rr-disk text-xs"></i> Save Topic Details'; 
                btn.disabled = false; 
            }).catch(err => {
                console.error(err);
                typeof showToast === 'function' && showToast("❌ Error saving topic.");
                btn.innerHTML = '<i class="fi fi-rr-disk text-xs"></i> Save Topic Details'; 
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
