<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Substitutions</title>
    <!-- Favicon / PWA Setup -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="logo-512.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="logo-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            bg: '#f8f9fc',
                            border: '#e5e7eb',
                            textMuted: '#6b7280',
                            textDark: '#111827',
                            blue: '#134E8E',
                            red: '#C00707',
                            yellow: '#FFB33F'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        i[class^="fi-"] { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Dropdown animation */
        .dropdown-enter { animation: drop-in 0.15s ease-out forwards; transform-origin: top right; }
        @keyframes drop-in {
            0% { opacity: 0; transform: scale(0.95) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

    </style>
</head>
<body class="bg-brand-bg font-sans min-h-screen p-4 sm:p-6 md:p-8">

    <div class="max-w-full w-full mx-auto">
        <!-- Header Section -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl sm:text-[22px] font-semibold text-gray-900 leading-tight">Substitutions</h1>
                <p class="text-[12px] sm:text-[13px] text-gray-500 mt-0.5 sm:mt-1">Manage candidate substitutions for programmes (<span id="total-count-header">0</span> total)</p>
            </div>
            
            <div class="flex items-center ml-4 gap-3">
                <button onclick="" class="flex items-center justify-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-lg text-[13px] font-semibold text-gray-700 hover:bg-gray-50 transition-colors shadow-sm">
                    <i class="fi fi-rr-download text-sm"></i>
                    <span class="hidden sm:block">Export</span>
                </button>
                <button onclick="window.openSubSidebar()" class="bg-[#FACC15] hover:bg-[#EAB308] text-yellow-950 px-5 py-2.5 rounded-xl text-[13px] font-bold transition-colors shadow-sm flex items-center justify-center gap-2 px-6">
                    <i class="fi fi-rr-plus text-xs"></i>
                    <span class="hidden sm:block">Add Substitution</span>
                </button>
            </div>
        </div>

        <!-- Main Card Area -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] overflow-hidden">
            <!-- Toolbar -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 border-b border-gray-100 gap-4 sm:gap-0">
                <div class="flex bg-gray-100/80 p-1 rounded-lg items-center w-full sm:w-auto overflow-x-auto no-scrollbar border border-gray-200/60">
                    <button id="btn-table" onclick="switchView('table')" class="bg-white shadow-sm text-[#111827] text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap">
                        <i class="fi fi-rr-table-list text-xs shrink-0"></i>
                        Table
                    </button>
                    <button id="btn-cards" onclick="switchView('cards')" class="text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap">
                        <i class="fi fi-rr-grid text-xs shrink-0"></i>
                        Cards
                    </button>
                </div>
                <!-- Search -->
                <div class="flex items-center gap-3 w-full sm:w-auto mt-3 sm:mt-0">
                    <button class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors">
                        <i class="fi fi-rr-search text-[14px]"></i>
                    </button>
                    <button class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors">
                        <i class="fi fi-rr-filter text-[14px]"></i>
                    </button>
                    <button class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors">
                        <i class="fi fi-rr-sort-amount-down text-[14px]"></i>
                    </button>
                </div>
            </div>

            <!-- TABLE VIEW -->
            <div id="view-table" class="block w-full overflow-x-auto">
                <div id="subs-table-container" class="w-full min-w-[900px]">
                    <div id="standard-header" class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-[#FAFAFA]">
                        <div class="col-span-1 flex items-center">
                            <div class="w-5 h-5 rounded-full border-2 border-gray-200"></div>
                        </div>
                        <div class="col-span-3 text-[13px] font-semibold text-gray-600">Program</div>
                        <div class="col-span-3 text-[13px] font-semibold text-gray-600">Original → Substitute</div>
                        <div class="col-span-2 text-[13px] font-semibold text-gray-600">Reason</div>
                        <div class="col-span-1 text-[13px] font-semibold text-gray-600 text-center">Status</div>
                        <div class="col-span-1 text-[13px] font-semibold text-gray-600 text-center">Issued</div>
                        <div class="col-span-1 text-[13px] font-semibold text-gray-600 text-right">Actions</div>
                    </div>
                    
                    <div id="subs-table-list" class="divide-y divide-gray-100">
                        <!-- Dynamic contents -->
                    </div>
                </div>
            </div>

            <!-- CARDS VIEW -->
            <div id="view-cards" class="hidden p-6 bg-gray-50/50">
                <div id="subs-cards-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <!-- Dynamic contents -->
                </div>
            </div>

            <!-- Footer / Pagination -->
            <div class="flex flex-col sm:flex-row justify-between items-center py-3 px-4 sm:px-6 bg-white border-t border-gray-100 text-[13px] text-gray-600">
                <div class="flex items-center space-x-2 sm:space-x-3 mb-3 sm:mb-0">
                    <span id="results-count">Showing 0 results</span>
                    <span class="text-gray-300 text-[10px] hidden sm:inline">●</span>
                    <div class="relative ml-2 sm:ml-0">
                        <select id="subs-per-page" class="appearance-none border border-gray-200 rounded-md py-1 pl-2 pr-6 bg-white outline-none hover:border-gray-300 focus:border-gray-400 cursor-pointer">
                            <option value="15">15</option>
                            <option value="50">50</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                            <i class="fi fi-rr-angle-small-down text-[10px]"></i>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-3 sm:space-x-4">
                    <button class="w-7 h-7 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 disabled:opacity-50"><i class="fi fi-rr-angle-small-left text-xs"></i></button>
                    <span id="subs-page-info" class="text-gray-600 text-[12px] sm:text-[13px]">Page 1 of 0</span>
                    <button class="w-7 h-7 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 disabled:opacity-50"><i class="fi fi-rr-angle-small-right text-xs"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== SIDEBAR ===== -->
    <div id="subOverlay" onclick="window.closeSubSidebar()" class="fixed inset-0 bg-gray-900/60 z-[60] hidden transition-opacity duration-300"></div>
    
    <div id="subSidebar" class="fixed inset-y-0 right-0 w-full sm:w-[480px] bg-white shadow-[-10px_0_30px_rgba(0,0,0,0.1)] z-[70] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="px-6 py-5 flex items-center justify-between bg-white border-b border-gray-100">
            <h2 class="text-[18px] font-bold text-gray-900">Create Substitution</h2>
            <button onclick="window.closeSubSidebar()" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-200 hover:text-gray-700 transition-colors">
                <i class="fi fi-rr-cross text-sm"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            
            <!-- Program Selection -->
            <div>
                <label class="block text-[13px] font-bold text-gray-800 mb-1.5 pl-1">Program *</label>
                <div class="relative">
                    <i class="fi fi-rr-search absolute left-0 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <!-- Input acting as search & selected display -->
                    <input type="text" id="progSearchInput" placeholder="Select a program..." autocomplete="off"
                        class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg text-[13px] text-gray-800 outline-none transition-all">
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                        <i class="fi fi-rr-angle-small-down text-xs"></i>
                    </div>

                    <!-- Dropdown List Overlay -->
                    <div id="progDropdown" class="hidden absolute top-full left-0 right-0 mt-2 bg-white border border-gray-200 rounded-xl shadow-xl z-50 max-h-64 overflow-y-auto">
                        <!-- Populated via JS JS -->
                    </div>
                </div>
                <input type="hidden" id="selectedProgramId">
            </div>

            <!-- Substitution Type -->
            <div class="pt-2">
                <label class="block text-[13px] font-bold text-gray-800 mb-2 pl-1">Substitution Type *</label>
                <div class="space-y-2 bg-white p-3 rounded-lg border border-gray-200">
                    <label class="flex items-center gap-3 cursor-pointer p-1 hover:opacity-80 transition-opacity">
                        <input type="radio" name="subType" value="substitute" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500 cursor-pointer" checked onchange="toggleSubUI()">
                        <span class="text-[13px] font-semibold text-gray-700">Substitute with another candidate</span>
                    </label>
                    <div class="w-full h-px bg-gray-100/80 my-1"></div>
                    <label class="flex items-center gap-3 cursor-pointer p-1 hover:opacity-80 transition-opacity">
                        <input type="radio" name="subType" value="cancel" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500 cursor-pointer" onchange="toggleSubUI()">
                        <span class="text-[13px] font-semibold text-gray-700">Temporarily cancel participation</span>
                    </label>
                </div>
                <!-- Logic for Radio Buttons UI update -->
                <script>
                    function toggleSubUI() {
                        const val = document.querySelector('input[name="subType"]:checked').value;
                        if (val === 'cancel') {
                            document.getElementById('substituteSelectBlock').classList.add('hidden');
                        } else {
                            document.getElementById('substituteSelectBlock').classList.remove('hidden');
                        }
                    }
                </script>
            </div>

            <!-- Candidate Blocks -->
            <div id="candContainer" class="hidden space-y-6 pt-2">
                <div>
                    <label class="block text-[11px] font-bold text-red-600 uppercase tracking-widest mb-1">Original Student *</label>
                    <div class="relative">
                        <select id="originalCandId" class="w-full px-4 py-2.5 bg-white border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg text-[13px] text-gray-800 outline-none transition-all appearance-none pr-8 cursor-pointer">
                            <option value="">Select registered candidate...</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
                            <i class="fi fi-rr-angle-small-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <div id="substituteSelectBlock" class="relative">
                    <label class="block text-[11px] font-bold text-green-600 uppercase tracking-widest mb-1">Substitute Student *</label>
                    <div class="relative">
                        <select id="substituteCandId" class="w-full px-4 py-2.5 bg-white border border-green-300 focus:border-green-500 focus:ring-1 focus:ring-green-500 rounded-lg text-[13px] text-gray-800 outline-none transition-all appearance-none pr-8 cursor-pointer">
                            <option value="">Select replacement candidate...</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
                            <i class="fi fi-rr-angle-small-down text-xs"></i>
                        </div>
                    </div>
                    <div class="text-[10px] text-gray-400 font-medium pt-1.5 italic">Substitute must belong to the same team.</div>
                </div>
            </div>

            <!-- Reason -->
            <div class="pt-2">
                <label class="block text-[13px] font-bold text-gray-800 mb-2 pl-1">Reason *</label>
                <div class="flex flex-wrap gap-2 mb-3">
                    <button type="button" onclick="setReasonText('Medical issue', this)" class="px-3.5 py-1.5 rounded-md border border-gray-200 text-[12px] font-medium transition-all text-blue-700 bg-blue-50 border-blue-200 shadow-sm reason-btn">Medical issue</button>
                    <button type="button" onclick="setReasonText('Absence', this)" class="px-3.5 py-1.5 rounded-md border border-gray-200 text-[12px] font-medium text-gray-600 hover:bg-gray-50 transition-all reason-btn">Absence</button>
                    <button type="button" onclick="setReasonText('Personal Leave', this)" class="px-3.5 py-1.5 rounded-md border border-gray-200 text-[12px] font-medium text-gray-600 hover:bg-gray-50 transition-all reason-btn">Personal Leave</button>
                    <button type="button" onclick="setReasonText('Official Leave', this)" class="px-3.5 py-1.5 rounded-md border border-gray-200 text-[12px] font-medium text-gray-600 hover:bg-gray-50 transition-all reason-btn">Official Leave</button>
                </div>
                <input type="text" id="subReason" placeholder="Or enter a custom reason here..." value="Medical issue" class="w-full px-4 py-2 bg-white border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg text-[13px] text-gray-800 outline-none transition-all mt-2">
                
                <script>
                    function setReasonText(text, btn) {
                        document.getElementById('subReason').value = text;
                        document.querySelectorAll('.reason-btn').forEach(b => {
                            b.className = "px-3.5 py-1.5 rounded-md border border-gray-200 text-[12px] font-medium text-gray-600 hover:bg-gray-50 transition-all reason-btn";
                        });
                        btn.className = "px-3.5 py-1.5 rounded-md text-[12px] font-medium transition-all text-blue-700 bg-blue-50 border border-blue-200 shadow-sm reason-btn";
                    }
                </script>
            </div>
        </div>

        <div class="p-6 bg-white flex justify-end gap-3 border-t border-gray-100 pt-5">
            <button onclick="window.closeSubSidebar()" class="px-6 py-2 bg-white text-gray-500 rounded-lg text-[13px] font-bold hover:bg-gray-50 hover:text-gray-800 transition-all">
                Cancel
            </button>
            <button id="btn-save" onclick="window.saveSubstitution()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-[13px] font-bold transition-all shadow-md flex items-center justify-center gap-2">
                <i class="fi fi-rr-document text-sm"></i>
                <span>Create Substitution</span>
            </button>
        </div>
    </div>

    <!-- Data Logic -->
    <script>
        var substitutionsData = [];
        var programsData = [];
        var candidatesData = [];
        var db = window.db || ((typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0) ? firebase.firestore() : null);

        // View logic
        function switchView(viewName) {
            const viewTable = document.getElementById('view-table');
            const viewCards = document.getElementById('view-cards');
            const btnTable = document.getElementById('btn-table');
            const btnCards = document.getElementById('btn-cards');

            const activeClassList = "bg-white shadow-sm text-[#111827] text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap";
            const inactiveClassList = "text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap";

            if (viewName === 'table') {
                viewTable.classList.remove('hidden'); viewCards.classList.add('hidden');
                btnTable.className = activeClassList; btnCards.className = inactiveClassList;
            } else {
                viewTable.classList.add('hidden'); viewCards.classList.remove('hidden');
                btnTable.className = inactiveClassList; btnCards.className = activeClassList;
            }
        }

        // INIT LOAD
        if(db) {
            // Programs Listener
            db.collection('programs').onSnapshot(snap => {
                programsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProgramDropdown();
            });

            // Candidates Listener
            db.collection('candidates').onSnapshot(snap => {
                candidatesData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Update select boxes if sidebar open
                if(document.getElementById('selectedProgramId').value) {
                    loadProgramCandidates(document.getElementById('selectedProgramId').value);
                }
            });

            // Substitutions Listener
            db.collection('substitutions').onSnapshot(snap => {
                substitutionsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Sort by createdAt desc in JS to avoid needing a Firestore index
                substitutionsData.sort((a, b) => {
                    const tA = (a.createdAt && a.createdAt.seconds) ? a.createdAt.seconds : 0;
                    const tB = (b.createdAt && b.createdAt.seconds) ? b.createdAt.seconds : 0;
                    return tB - tA;
                });
                renderSubstitutionsUI();
            });
        }

        function renderSubstitutionsUI() {
            const tableList = document.getElementById('subs-table-list');
            const cardsList = document.getElementById('subs-cards-list');
            document.getElementById('total-count-header').innerText = substitutionsData.length;
            document.getElementById('results-count').innerText = `Showing ${substitutionsData.length} results`;
            
            if (substitutionsData.length === 0) {
                tableList.innerHTML = `<div class="flex justify-center items-center py-20"><p class="text-[13px] text-gray-500 font-medium">No substitutions found</p></div>`;
                cardsList.innerHTML = `<div class="flex justify-center items-center py-14 col-span-full"><p class="text-[13px] text-gray-500 font-medium">No substitutions found</p></div>`;
                return;
            }
            
            let htmlTable = '', htmlCards = '';
            
            substitutionsData.forEach(sub => {
                const isCancel = sub.type === 'cancel';
                const dateStr = sub.createdAt && sub.createdAt.seconds ? new Date(sub.createdAt.seconds*1000).toLocaleDateString('en-GB') : new Date().toLocaleDateString('en-GB');
                
                const origChest = sub.origChestNo || '--';
                const subChest = sub.subChestNo || '--';
                
                const statusPill = `<span class="px-2.5 py-1 rounded bg-green-50 text-green-600 border border-green-100 font-bold text-[10px] uppercase tracking-wide">COMPLETED</span>`;

                // TABLE
                htmlTable += `
                <div class="grid grid-cols-12 gap-4 items-center py-3.5 px-6 border-b border-gray-50 bg-white hover:bg-gray-50/50 transition-colors">
                    <div class="col-span-1">
                        <div class="w-8 h-8 rounded-full border border-[#FFD085] flex items-center justify-center bg-[#F8F9FA] text-gray-400 font-medium text-[13px] shrink-0">
                            <i class="fi ${isCancel ? 'fi-rr-ban text-red-400' : 'fi-rr-refresh text-blue-500'}"></i>
                        </div>
                    </div>
                    <div class="col-span-3">
                        <div class="text-[13.5px] font-semibold text-gray-900 truncate pr-2">${sub.programName || 'Unknown'} <span class="text-gray-400 font-mono-custom text-[11px] ml-1">${sub.programCode || ''}</span></div>
                    </div>
                    <div class="col-span-3">
                        <div class="text-[12.5px] text-gray-800 pr-2 leading-tight">
                            <div class="font-medium text-red-600 block line-through decoration-red-200"><span class="font-mono-custom text-[11px] text-red-400 font-normal mr-1">#${origChest}</span>${sub.origCandidateName}</div>
                            ${!isCancel ? `<div class="font-bold text-green-700 mt-0.5"><span class="font-mono-custom text-[11px] text-green-500 font-normal mr-1">#${subChest}</span>${sub.subCandidateName}</div>` : ''}
                        </div>
                    </div>
                    <div class="col-span-2">
                        <div class="text-[12px] text-gray-600 py-1 px-2 bg-gray-50 border border-gray-100 rounded inline-block truncate max-w-full italic">"${sub.reason}"</div>
                    </div>
                    <div class="col-span-1 text-center">${statusPill}</div>
                    <div class="col-span-1 text-[12px] font-medium text-gray-500 text-center">${dateStr}</div>
                    <div class="col-span-1 flex justify-end">
                       <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 text-gray-400 transition-colors pointer"><i class="fi fi-rr-menu-dots-vertical text-[12px]"></i></button>
                    </div>
                </div>`;
            });
            
            tableList.innerHTML = htmlTable;
        }

        // Program Dropdown Logic
        const searchInput = document.getElementById('progSearchInput');
        const dropdown = document.getElementById('progDropdown');
        
        searchInput.addEventListener('input', () => {
            dropdown.classList.remove('hidden');
            renderProgramDropdown(searchInput.value.trim().toLowerCase());
        });
        
        searchInput.addEventListener('focus', () => {
            dropdown.classList.remove('hidden');
            renderProgramDropdown(searchInput.value.trim().toLowerCase());
        });
        
        document.addEventListener('click', (e) => {
            if(!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
        
        function renderProgramDropdown(query = '') {
            let html = '';
            
            programsData.forEach(p => {
                if(query) {
                    const c = (p.code||'').toLowerCase();
                    const n = (p.name||'').toLowerCase();
                    if(!c.includes(query) && !n.includes(query)) return;
                }
                
                html += `
                <div class="p-3 border-b border-gray-50 hover:bg-blue-50/50 cursor-pointer flex items-center justify-between" onclick="selectProgram('${p.id}', '${(p.name||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')}', '${(p.code||'').replace(/'/g,"\\'")}')">
                    <div class="flex items-center gap-3">
                        <div class="text-[11px] font-mono-custom bg-gray-100 border border-gray-200 px-1.5 py-0.5 rounded font-bold text-gray-500 w-16 text-center">${p.code || '---'}</div>
                        <div class="text-[13.5px] font-bold text-gray-800">${p.name || 'Unnamed Program'}</div>
                    </div>
                </div>`;
            });
            
            if(!html) html = '<div class="p-4 text-[12px] text-gray-400 text-center font-medium">No active programs found matching search.</div>';
            dropdown.innerHTML = html;
        }
        
        function selectProgram(pid, name, code) {
            document.getElementById('selectedProgramId').value = pid;
            searchInput.value = `${code ? '['+code+'] ' : ''}${name}`;
            dropdown.classList.add('hidden');
            document.getElementById('candContainer').classList.remove('hidden');
            
            loadProgramCandidates(pid);
        }

        // Candidates Dynamic Loader
        function loadProgramCandidates(pid) {
            const origSelect = document.getElementById('originalCandId');
            const subSelect = document.getElementById('substituteCandId');
            
            origSelect.innerHTML = '<option value="">Loading...</option>';
            subSelect.innerHTML = '<option value="">Loading...</option>';
            
            db.collection('registrations').where('programId', '==', pid).get().then(snap => {
                // Determine who is registered
                let registeredCands = [];
                let teamMap = {}; // Cand ID -> Team name

                snap.forEach(doc => {
                    const r = doc.data();
                    const team = r.team;
                    if(r.candidateIds && r.candidateIds.length) {
                        r.candidateIds.forEach(id => {
                            registeredCands.push(id);
                            teamMap[id] = team;
                        });
                    }
                });

                if(registeredCands.length === 0) {
                    origSelect.innerHTML = '<option value="">(No registered candidates in this program)</option>';
                    return;
                }

                // Populate Original Candidate Dropdown
                let origHTML = '<option value="">Select registered candidate...</option>';
                registeredCands.forEach(cid => {
                    const c = candidatesData.find(can => can.id === cid);
                    if(c) {
                        origHTML += `<option value="${c.id}" data-team="${c.team}">#${c.chestNo} - ${c.name} (${c.team})</option>`;
                    }
                });
                origSelect.innerHTML = origHTML;
                
                // Event listener on 'origSelect' to populate 'subSelect' with active team members only!
                origSelect.onchange = function() {
                    const selOpt = this.options[this.selectedIndex];
                    const selectedTeam = selOpt.getAttribute('data-team');
                    if(!selectedTeam) {
                        subSelect.innerHTML = '<option value="">Select original candidate first...</option>';
                        return;
                    }
                    
                    let subHTML = '<option value="">Select replacement candidate...</option>';
                    candidatesData.forEach(c => {
                        // Must be in the same team
                        if(c.team === selectedTeam) {
                            // Must NOT already be registered
                            if(!registeredCands.includes(c.id)) {
                                subHTML += `<option value="${c.id}">#${c.chestNo} - ${c.name}</option>`;
                            }
                        }
                    });
                    subSelect.innerHTML = subHTML;
                };
                
                // Trigger reset
                origSelect.onchange();
            });
        }


        // SAVE LOGIC
        window.openSubSidebar = function() {
            document.getElementById('progSearchInput').value = '';
            document.getElementById('selectedProgramId').value = '';
            document.getElementById('candContainer').classList.add('hidden');
            document.getElementById('originalCandId').innerHTML = '<option value="">Select registered candidate...</option>';
            document.getElementById('substituteCandId').innerHTML = '<option value="">Select replacement candidate...</option>';
            document.getElementById('subReason').value = '';
            document.querySelectorAll('.reason-btn').forEach(b => {
                b.className = "px-3.5 py-1.5 rounded-md border border-gray-200 text-[12px] font-medium text-gray-600 hover:bg-gray-50 transition-all reason-btn";
            });
            
            document.getElementById('subOverlay').classList.remove('hidden');
            document.getElementById('subSidebar').classList.remove('translate-x-full');
        };

        window.closeSubSidebar = function() {
            document.getElementById('subOverlay').classList.add('hidden');
            document.getElementById('subSidebar').classList.add('translate-x-full');
        };

        window.saveSubstitution = async function() {
            const btn = document.getElementById('btn-save');
            
            const pid = document.getElementById('selectedProgramId').value;
            const subType = document.querySelector('input[name="subType"]:checked').value; // 'substitute' or 'cancel'
            const origId = document.getElementById('originalCandId').value;
            const subId = document.getElementById('substituteCandId').value;
            const reason = document.getElementById('subReason').value.trim();

            if(!pid || !origId || !reason) {
                return typeof showToast === 'function' ? showToast("❌ Fill required fields") : alert("Fill required fields");
            }
            if(subType === 'substitute' && !subId) {
                return typeof showToast === 'function' ? showToast("❌ Select Substitute Student") : alert("Select Substitute");
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fi fi-rr-spinner animate-spin text-sm"></i> <span>Saving...</span>';

            try {
                // Find data
                const prog = programsData.find(p => p.id === pid);
                const oCand = candidatesData.find(c => c.id === origId);
                const sCand = subType === 'substitute' ? candidatesData.find(c => c.id === subId) : null;
                
                if (!oCand) throw new Error("Original candidate not found in database.");
                if (subType === 'substitute' && !sCand) throw new Error("Substitute candidate not found in database.");

                // 1. We must find the `registrations` document for this program and TEAM.
                const snap = await db.collection('registrations')
                    .where('programId', '==', pid)
                    .where('team', '==', oCand.team || "")
                    .get();

                if (snap.empty) {
                    throw new Error("Registration document not found for this candidate's team!");
                }
                
                const regDoc = snap.docs[0];
                const regRef = regDoc.ref;
                const regData = regDoc.data();

                // 2. Perform DB array mutations
                let updatedCandIds = [...regData.candidateIds];
                let updatedChestNos = regData.chestNumbers ? [...regData.chestNumbers] : [];

                const idxId = updatedCandIds.findIndex(id => String(id) === String(origId));
                if (idxId > -1) updatedCandIds.splice(idxId, 1);
                
                const idxChest = updatedChestNos.findIndex(c => String(c) === String(oCand.chestNo));
                if (idxChest > -1) updatedChestNos.splice(idxChest, 1);

                if (subType === 'substitute' && sCand) {
                    updatedCandIds.push(sCand.id);
                    if(sCand.chestNo) updatedChestNos.push(sCand.chestNo);
                }

                // Use transaction or batch
                const batch = db.batch();
                batch.update(regRef, {
                    candidateIds: updatedCandIds,
                    chestNumbers: updatedChestNos,
                    participantCount: updatedCandIds.length
                });

                // 3. Create Audit Trail
                const subRef = db.collection('substitutions').doc();
                const subPayload = {
                    programId: pid,
                    programName: prog.name,
                    programCode: prog.code,
                    type: subType,
                    origCandidateId: oCand.id,
                    origCandidateName: oCand.name,
                    origChestNo: oCand.chestNo,
                    subCandidateId: sCand ? sCand.id : null,
                    subCandidateName: sCand ? sCand.name : null,
                    subChestNo: sCand ? sCand.chestNo : null,
                    reason: reason,
                    team: oCand.team || "",
                };

                if (typeof firebase !== 'undefined' && firebase.firestore) {
                    subPayload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                } else {
                    subPayload.createdAt = new Date();
                }
                batch.set(subRef, subPayload);

                await batch.commit();

                // Success
                typeof showToast === 'function' && showToast("✅ Substitution Saved & Applied!");
                closeSubSidebar();
            } catch (err) {
                console.error(err);
                typeof showToast === 'function' ? showToast("❌ Save Error: " + err.message) : alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fi fi-rr-document text-sm"></i> <span>Create Substitution</span>';
            }
        };

    </script>
</body>
</html>
