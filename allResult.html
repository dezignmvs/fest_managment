<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Uicons -->
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#134E8E',
                            gold: '#FFB33F',
                            red: '#C00707',
                            orange: '#FF4400',
                            bg: '#f8f9fc'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fc;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        i[class^="fi-"] {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .table-row-hover:hover {
            background-color: #f9fafb;
        }
    </style>
</head>

<body class="bg-brand-bg font-sans min-h-screen p-4 sm:p-6 md:p-8">
    <div class="max-w-full w-full mx-auto relative">

        <!-- Header Section (Matches allCandidates) -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl sm:text-[22px] font-semibold text-gray-900 leading-tight">Standings</h1>
                <p class="text-[12px] sm:text-[13px] text-gray-500 mt-0.5 sm:mt-1">View live festival rankings and
                    results</p>
            </div>
            <div class="flex items-center ml-4">
                <div class="relative group">
                    <select id="section-filter" onchange="window.handleSectionFilter(this.value)"
                        class="appearance-none bg-white border border-gray-200 rounded-full pl-5 pr-10 py-2.5 text-[13px] font-bold text-gray-700 focus:outline-none focus:ring-2 focus:ring-brand-gold/30 transition-all cursor-pointer shadow-sm">
                        <option value="All">All Sections</option>
                    </select>
                    <i
                        class="fi fi-rr-angle-small-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                </div>
            </div>
        </div>

        <!-- Achievement Blocks (Minimal Grid) -->
        <div id="team-rank-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <!-- Populated via JS -->
            <div class="h-28 bg-white rounded-xl border border-gray-200 animate-pulse"></div>
            <div class="h-28 bg-white rounded-xl border border-gray-200 animate-pulse"></div>
            <div class="h-28 bg-white rounded-xl border border-gray-200 animate-pulse"></div>
            <div class="h-28 bg-white rounded-xl border border-gray-200 animate-pulse"></div>
        </div>

        <!-- Results Display Box (Matches allCandidates Card Style) -->
        <div
            class="bg-white rounded-xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] overflow-hidden">

            <!-- Toolbar (Matches allCandidates) -->
            <div
                class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 border-b border-gray-100 gap-4 sm:gap-0">
                <div
                    class="flex bg-gray-100/80 p-1 rounded-lg items-center w-full sm:w-auto overflow-x-auto no-scrollbar border border-gray-200/60">
                    <button id="btn-table" onclick="window.switchViewMode('table')"
                        class="bg-white shadow-sm text-gray-900 text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all">
                        <i class="fi fi-rr-table-list text-xs shrink-0"></i> Table
                    </button>
                    <button id="btn-cards" onclick="window.switchViewMode('cards')"
                        class="text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all">
                        <i class="fi fi-rr-grid text-xs shrink-0"></i> Cards
                    </button>
                </div>

                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="relative w-full sm:w-64">
                        <i class="fi fi-rr-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="prog-search" oninput="window.handleSearch(this.value)"
                            placeholder="Search programs..."
                            class="w-full pl-8 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full text-[13px] focus:outline-none focus:ring-2 focus:ring-brand-gold/30 transition-all">
                    </div>
                </div>
            </div>

            <!-- Table Mode -->
            <div id="view-table" class="block w-full overflow-x-auto no-scrollbar">
                <div id="results-table-container" class="min-w-[1000px]">
                    <div id="standard-header"
                        class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-[#FAFAFA]">
                        <div class="col-span-1 text-[13px] font-medium text-gray-700 text-center">Pos</div>
                        <div class="col-span-4 text-[13px] font-medium text-gray-700">Program</div>
                        <div id="dynamic-team-headers"
                            class="col-span-6 grid grid-flow-col auto-cols-auto gap-4 items-center text-center">
                            <!-- JS Populated -->
                        </div>
                        <div class="col-span-1 text-[13px] font-medium text-gray-700 text-right">More</div>
                    </div>

                    <div id="results-list" class="divide-y divide-gray-50">
                        <!-- JS Dynamic -->
                    </div>
                </div>

                <div id="empty-state" class="hidden py-16 text-center">
                    <i class="fi fi-rr-search text-gray-300 text-4xl mb-3 block"></i>
                    <p class="text-[13px] text-gray-400 font-medium">No results recorded yet.</p>
                </div>
            </div>

            <!-- Cards Mode -->
            <div id="view-cards" class="hidden p-6 bg-gray-50/50">
                <div id="results-cards-list"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <!-- JS Dynamic -->
                </div>
            </div>

            <!-- Footer (Matches allCandidates) -->
            <div
                class="flex flex-col sm:flex-row justify-between items-center py-3 px-4 sm:px-6 bg-white border-t border-gray-100 text-[13px] text-gray-600">
                <div class="flex items-center space-x-2 sm:space-x-3 mb-3 sm:mb-0">
                    <span id="results-count">Showing results</span>
                    <span class="text-gray-300 text-[10px] hidden sm:inline">●</span>
                    <div class="relative ml-2 sm:ml-0">
                        <select id="pp-select" onchange="window.handlePageLimit(this.value)"
                            class="appearance-none border border-gray-200 rounded-md py-1 pl-2 pr-6 bg-white outline-none hover:border-gray-300 cursor-pointer text-[12px]">
                            <option value="15">15</option>
                            <option value="30">30</option>
                            <option value="50">50</option>
                        </select>
                        <i
                            class="fi fi-rr-angle-small-down absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-[10px]"></i>
                    </div>
                </div>

                <div class="flex items-center space-x-3 sm:space-x-4">
                    <button id="prev-btn" onclick="window.changePage(-1)"
                        class="w-7 h-7 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 hover:text-gray-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fi fi-rr-angle-small-left text-xs"></i>
                    </button>
                    <span id="page-info" class="text-gray-600 text-[12px] sm:text-[13px]">Page 1 of 1</span>
                    <button id="next-btn" onclick="window.changePage(1)"
                        class="w-7 h-7 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 hover:text-gray-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fi fi-rr-angle-small-right text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script>
            (function () {
                let allPrograms = [], allResults = [], allTeams = [], allSections = [], allNegMarks = [];
                let currentFilter = 'All', searchQuery = '', viewMode = 'table', currentPage = 1, pageLimit = 15;
                let teamPointsMap = {}, rankedTeams = [];

                const dbRef = window.db;
                if (!dbRef) return;

                // Listeners
                dbRef.collection('teams').where('isActive', '==', true).onSnapshot(s => { allTeams = s.docs.map(d => ({ id: d.id, ...d.data() })); updateData(); });
                dbRef.collection('sections').onSnapshot(s => { allSections = s.docs.map(d => d.data().name); renderSectionFilter(); });
                dbRef.collection('programs').onSnapshot(s => { allPrograms = s.docs.map(d => ({ id: d.id, ...d.data() })); updateData(); });
                dbRef.collection('programResults').onSnapshot(s => { allResults = s.docs.map(d => ({ id: d.id, ...d.data() })); updateData(); });
                dbRef.collection('negativeMarks').where('status', '==', 'Active').onSnapshot(s => { allNegMarks = s.docs.map(d => ({ id: d.id, ...d.data() })); updateData(); });

                function updateData() { calculatePoints(); renderRankings(); renderDataView(); }

                function calculatePoints() {
                    teamPointsMap = {}; allTeams.forEach(t => teamPointsMap[t.name] = { points: 0, color: t.color || '#CBD5E1' });
                    
                    // Add Program Results
                    const pubIds = new Set(allPrograms.filter(p => p.resultsPublished && (currentFilter === 'All' || p.section === currentFilter)).map(p => p.id));
                    allResults.forEach(r => { if (pubIds.has(r.programId) && teamPointsMap[r.team]) teamPointsMap[r.team].points += (r.totalPoints || 0); });
                    
                    // Subtract Negative Marks
                    allNegMarks.forEach(neg => {
                        if (neg.teams && Array.isArray(neg.teams)) {
                            // Deduct from each team involved (if it's a team-based penalty)
                            // Or deduct the total marks once if it's a shared penalty. 
                            // Standard: Deduct the 'marks' amount from each team associated with the candidates.
                            const uniqueTeams = [...new Set(neg.teams)];
                            uniqueTeams.forEach(tName => {
                                if (teamPointsMap[tName]) teamPointsMap[tName].points -= (neg.marks || 0);
                            });
                        }
                    });

                    rankedTeams = Object.keys(teamPointsMap).map(n => ({ name: n, ...teamPointsMap[n] })).sort((a, b) => b.points - a.points);
                    rankedTeams.forEach((t, i) => t.rank = i + 1);
                }

                function renderRankings() {
                    let html = '';
                    rankedTeams.slice(0, 4).forEach((team) => {
                        const icn = team.rank === 1 ? 'fi-rr-trophy' : (team.rank === 2 ? 'fi-rr-star' : 'fi-rr-badge-check');
                        html += `
                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm group hover:border-brand-gold transition-colors">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-2">
                                <span class="status-dot" style="background-color: ${team.color}"></span>
                                <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest truncate max-w-[100px]">${team.name}</span>
                            </div>
                            <i class="fi ${icn} text-gray-200 text-lg group-hover:text-brand-gold transition-colors"></i>
                        </div>
                        <div class="flex items-baseline gap-2">
                            <span class="text-2xl font-black text-gray-900 leading-tight">${team.points}</span>
                            <span class="text-[11px] font-bold text-gray-400 uppercase">Pts</span>
                        </div>
                        <div class="mt-4 w-full h-1 bg-gray-50 rounded-full overflow-hidden">
                            <div class="h-full bg-brand-blue" style="width: ${Math.min(100, (team.points / (rankedTeams[0]?.points || 1)) * 100)}%"></div>
                        </div>
                    </div>`;
                    });
                    document.getElementById('team-rank-grid').innerHTML = html || '<div class="text-gray-300 py-10">Waiting for data...</div>';
                }

                function renderDataView() {
                    const s = searchQuery.toLowerCase().trim();
                    const filtered = allPrograms.filter(p => p.resultsPublished && (currentFilter === 'All' || p.section === currentFilter) && (p.name.toLowerCase().includes(s) || (p.code && p.code.toLowerCase().includes(s))));

                    if (filtered.length === 0) { document.getElementById('results-list').innerHTML = ''; document.getElementById('results-cards-list').innerHTML = ''; document.getElementById('empty-state').classList.remove('hidden'); return; }
                    document.getElementById('empty-state').classList.add('hidden');

                    const total = filtered.length, pages = Math.ceil(total / pageLimit) || 1;
                    if (currentPage > pages) currentPage = pages;
                    const start = (currentPage - 1) * pageLimit, paginated = filtered.slice(start, start + pageLimit);

                    document.getElementById('results-count').innerText = `Showing ${filtered.length} total standings`;
                    document.getElementById('page-info').innerText = `Page ${currentPage} of ${pages}`;
                    document.getElementById('prev-btn').disabled = currentPage === 1;
                    document.getElementById('next-btn').disabled = currentPage === pages;

                    renderTableRows(paginated, start);
                    renderCards(paginated);
                }

                function renderTableRows(paginated, startIdx) {
                    let h = '';
                    rankedTeams.forEach(t => h += `<div class="text-[10px] font-bold text-gray-400 uppercase text-center truncate px-1">${t.name.split(' ')[0]}</div>`);
                    document.getElementById('dynamic-team-headers').innerHTML = h;

                    let rowHtml = '';
                    paginated.forEach((prog, i) => {
                        const progResults = allResults.filter(r => r.programId === prog.id);
                        rowHtml += `
                    <div class="grid grid-cols-12 gap-4 items-center py-4 px-6 table-row-hover transition-colors">
                        <div class="col-span-1 text-[13px] font-medium text-gray-400 text-center">${startIdx + i + 1}</div>
                        <div class="col-span-4 flex flex-col min-w-0">
                            <span class="text-[14px] font-semibold text-gray-900 leading-tight truncate">${prog.name}</span>
                            <span class="text-[11px] text-gray-400 mt-1 uppercase tracking-wider">${prog.code || 'PRG'} • <span class="text-brand-blue font-bold">${prog.section}</span></span>
                        </div>
                        <div class="col-span-6 grid grid-flow-col auto-cols-auto gap-4 items-center">`;
                        rankedTeams.forEach(t => {
                            const pts = progResults.filter(r => r.team === t.name).reduce((sum, r) => sum + (r.totalPoints || 0), 0);
                            rowHtml += `<div class="text-[13px] font-bold text-center ${pts > 0 ? 'text-gray-900 border-b-2 border-brand-gold/20 pb-0.5' : 'text-gray-100'}">${pts > 0 ? pts : '-'}</div>`;
                        });
                        rowHtml += `
                        </div>
                        <div class="col-span-1 flex justify-end">
                            <button onclick="window.viewProgramDetails('${prog.id}')" class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center text-gray-300 hover:text-brand-gold hover:border-brand-gold transition-all">
                                <i class="fi fi-rr-arrow-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>`;
                    });
                    document.getElementById('results-list').innerHTML = rowHtml;
                }

                function renderCards(paginated) {
                    let html = '';
                    paginated.forEach(p => {
                        const res = allResults.filter(r => r.programId === p.id);
                        let items = '';
                        rankedTeams.forEach(t => {
                            const pts = res.filter(r => r.team === t.name).reduce((sum, r) => sum + (r.totalPoints || 0), 0);
                            if (pts > 0) items += `<div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0"><div class="flex items-center gap-2"><div class="status-dot" style="background-color: ${t.color}"></div><span class="text-[11px] font-semibold text-gray-600 truncate">${t.name}</span></div><span class="text-[12px] font-bold text-brand-blue">${pts}</span></div>`;
                        });
                        html += `
                    <div class="bg-white rounded-xl border border-gray-200 p-5 flex flex-col h-full hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">${p.code}</span>
                            <span class="px-2 py-0.5 bg-gray-50 rounded text-[9px] font-bold text-gray-400 uppercase">${p.section}</span>
                        </div>
                        <h3 class="text-md font-bold text-gray-900 mb-4 leading-tight truncate">${p.name}</h3>
                        <div class="flex-1 space-y-1 mb-5">${items || '<div class="text-center py-4 text-[11px] text-gray-300 italic">No points yet</div>'}</div>
                        <button onclick="window.viewProgramDetails('${p.id}')" class="w-full py-2 bg-gray-50 border border-gray-200 rounded-lg text-[11px] font-bold text-gray-400 hover:bg-brand-blue hover:text-white transition-all flex items-center justify-center gap-2">Details <i class="fi fi-rr-arrow-right"></i></button>
                    </div>`;
                    });
                    document.getElementById('results-cards-list').innerHTML = html;
                }

                function renderSectionFilter() {
                    let h = '<option value="All">All Sections</option>';
                    allSections.forEach(s => h += `<option value="${s}">${s}</option>`);
                    document.getElementById('section-filter').innerHTML = h;
                }

                // Handlers
                window.handleSectionFilter = (v) => { currentFilter = v; currentPage = 1; updateData(); };
                window.handleSearch = (v) => { searchQuery = v; currentPage = 1; renderDataView(); };
                window.switchViewMode = (m) => {
                    viewMode = m; const isT = m === 'table';
                    document.getElementById('view-table').classList.toggle('hidden', !isT); document.getElementById('view-cards').classList.toggle('hidden', isT);

                    const btnT = document.getElementById('btn-table'), btnC = document.getElementById('btn-cards');
                    btnT.className = isT ? "bg-white shadow-sm text-gray-900 text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all" : "text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all";
                    btnC.className = !isT ? "bg-white shadow-sm text-gray-900 text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all" : "text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all";
                };
                window.changePage = (dir) => { currentPage += dir; updateData(); };
                window.handlePageLimit = (v) => { pageLimit = parseInt(v); currentPage = 1; updateData(); };
                window.viewProgramDetails = (pid) => { localStorage.setItem('viewProgramId', pid); if (typeof loadModule === 'function') loadModule('viewProgramData'); else window.location.href = 'viewProgramData.html'; };

                updateData();
                window.switchViewMode('table');
            })();
    </script>
</body>

</html>
