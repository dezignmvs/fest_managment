<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="icon" type="image/svg+xml" href="logo-192.svg">
    <link rel="apple-touch-icon" href="logo-512.svg">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-xl w-full max-w-[400px] p-8 border border-gray-100 text-center">
        <h1 class="text-3xl font-black text-blue-900 mb-2">Team Auction</h1>
        <p class="text-sm text-gray-500 mb-8">Login to your team dashboard to participate in the active draft.</p>

        <form id="loginForm" class="space-y-5 text-left">
            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
            </div>

            <button type="submit" id="submitBtn" class="w-full flex justify-center items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md mt-6">
                Enter Draft Room
            </button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCKA0k_9UgoJX_RBgEsIeNdiW2w0Okko1o",
            authDomain: "festie-s1u2h3.firebaseapp.com",
            projectId: "festie-s1u2h3",
            storageBucket: "festie-s1u2h3.firebasestorage.app",
            messagingSenderId: "794049194885",
            appId: "1:794049194885:web:8f75f0df4c15cde15eb2ec"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        function showToast(msg, isError=false) {
            Toastify({
                text: msg, duration: 3000, gravity: "top", position: "center",
                style: { background: isError ? "#ef4444" : "#10b981", color: "#fff", borderRadius: "8px" }
            }).showToast();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Authenticating...";

            try {
                // Find active or setup auction
                const snap = await db.collection('auctions')
                    .where('status', 'in', ['active', 'setup'])
                    .get();
                if (snap.empty) {
                    showToast("No active auction currently.", true);
                    btn.disabled = false;
                    btn.innerText = "Enter Draft Room";
                    return;
                }

                let found = false;
                for (let doc of snap.docs) {
                    const data = doc.data();
                    const team = data.teams.find(t => t.username === user && t.password === pass);
                    if (team) {
                        found = true;
                        localStorage.removeItem('userRole'); // Clear admin role if logging in as team
                        localStorage.setItem('auctionId', doc.id);
                        localStorage.setItem('auctionTeamId', team.teamId);
                        localStorage.setItem('auctionTeamName', team.teamName);
                        showToast(`Welcome, ${team.teamName}!`);
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                        break;
                    }
                }

                if (!found) {
                    showToast("Invalid credentials or you are not part of an active auction.", true);
                    btn.disabled = false;
                    btn.innerText = "Enter Draft Room";
                }

            } catch (err) {
                console.error(err);
                showToast("Error logging in. Try again.", true);
                btn.disabled = false;
                btn.innerText = "Enter Draft Room";
            }
        });
    </script>
</body>
</html>
